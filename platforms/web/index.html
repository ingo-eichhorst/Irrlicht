<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Irrlicht</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Dark palette — default. Light overrides live below. */
      --bg: #080c16;
      --bg-glow: #0d1424;
      --surface: #0f1628;
      --surface-hover: #141d34;
      --border: #1a2340;
      --border-subtle: #141c32;
      --text: #d4daf0;
      --text-bright: #edf0fa;
      --muted: #8e96b3;
      --header-bg: rgba(8, 12, 22, 0.85);
      --ctx-bar-track: rgba(255, 255, 255, 0.06);
      --sub-dot-open: rgba(139, 92, 246, 0.55);
      --sub-dot-filled: #34C759;
      --noise-opacity: 0.035;
      --grid-color: rgba(100, 140, 255, 0.3);
      --grid-opacity: 0.03;
      --working: #8B5CF6;
      --working-dim: rgba(139, 92, 246, 0.12);
      --working-glow: rgba(139, 92, 246, 0.25);
      --waiting: #FF9500;
      --waiting-dim: rgba(255, 149, 0, 0.12);
      --waiting-glow: rgba(255, 149, 0, 0.2);
      --ready: #34C759;
      --ready-dim: rgba(52, 199, 89, 0.12);
      --ready-glow: rgba(52, 199, 89, 0.2);
      --cancelled: #8E8E93;
      --cancelled-dim: rgba(142, 142, 147, 0.1);
      /* Pressure-bar colors — mirror overlay's ContextBarColor / pressure_level mapping:
         safe → low, caution → medium, warning → high, critical → critical. */
      --pressure-low: #34C759;
      --pressure-medium: #FF9500;
      --pressure-high: #FF3B30;
      --pressure-critical: #D70015;
      --ws-connected: #34C759;
      --ws-disconnected: #FF3B30;
      --font-mono: ui-monospace, "SF Mono", "Cascadia Code", "Fira Mono", Menlo, Consolas, monospace;
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    }

    /* Light palette — applied automatically when OS prefers light, unless the
       explicit override pins to dark. The same vars also apply when the user
       toggles [data-theme="light"]. */
    @media (prefers-color-scheme: light) {
      :root:not([data-theme="dark"]) {
        --bg: #f4f5f7;
        --bg-glow: #ffffff;
        --surface: #ffffff;
        --surface-hover: #ebeef4;
        --border: #d2d4dc;
        --border-subtle: #e4e6ed;
        --text: #1d1d1f;
        --text-bright: #000000;
        --muted: #6e6e73;
        --header-bg: rgba(255, 255, 255, 0.85);
        --ctx-bar-track: rgba(0, 0, 0, 0.08);
        --sub-dot-open: rgba(139, 92, 246, 0.45);
        --sub-dot-filled: #34C759;
        --noise-opacity: 0;
        --grid-color: rgba(60, 100, 200, 0.18);
        --grid-opacity: 0.04;
      }
    }
    :root[data-theme="light"] {
      --bg: #f4f5f7;
      --bg-glow: #ffffff;
      --surface: #ffffff;
      --surface-hover: #ebeef4;
      --border: #d2d4dc;
      --border-subtle: #e4e6ed;
      --text: #1d1d1f;
      --text-bright: #000000;
      --muted: #6e6e73;
      --header-bg: rgba(255, 255, 255, 0.85);
      --ctx-bar-track: rgba(0, 0, 0, 0.08);
      --sub-dot-open: rgba(139, 92, 246, 0.45);
      --sub-dot-filled: #34C759;
      --noise-opacity: 0;
      --grid-color: rgba(60, 100, 200, 0.18);
      --grid-opacity: 0.04;
    }

    body {
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 80% 60% at 50% 40%, var(--bg-glow) 0%, var(--bg) 100%);
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 14px;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* Noise texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      opacity: var(--noise-opacity);
      pointer-events: none;
      z-index: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 256px 256px;
    }

    /* Faint grid pattern */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      opacity: var(--grid-opacity);
      pointer-events: none;
      z-index: 0;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 59px, var(--grid-color) 59px, var(--grid-color) 60px),
        repeating-linear-gradient(90deg, transparent, transparent 59px, var(--grid-color) 59px, var(--grid-color) 60px);
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border-subtle);
      background: var(--header-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .header-left { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .header-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }

    /* App title — mirrors overlay's "Irrlicht v$VERSION" left of the state icons. */
    .app-title {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--font-sans);
      font-size: 13px;
      font-weight: 600;
      color: var(--text-bright);
      white-space: nowrap;
    }

    .app-title .app-name { letter-spacing: 0; }
    .app-title .app-version { font-weight: 400; color: var(--muted); font-variant-numeric: tabular-nums; }
    .app-title .app-sep { color: var(--muted); padding: 0 2px; }

    /* Aggregated state icons — up to 3 per-session glyphs colored by state,
       or "N sessions" text when there are more. Mirrors `sessionIconsView` in
       SessionListView.swift:346. */
    .app-state-icons {
      display: flex;
      align-items: center;
      gap: 4px;
      min-height: 14px;
    }

    .app-state-icon {
      width: 14px;
      height: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .app-state-icon svg {
      width: 14px;
      height: 14px;
      display: block;
    }

    .app-state-count {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text);
    }

    /* Single header cycling button — replaces the standalone view-mode-bar +
       timeline granularity buttons. Mirrors overlay's mode-cycle-btn at
       SessionListView.swift:314. */
    .view-mode-cycle {
      background: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.03em;
      padding: 3px 8px;
      cursor: pointer;
      min-width: 56px;
      text-align: center;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .view-mode-cycle:hover { border-color: var(--working); color: var(--text-bright); }
    .view-mode-cycle.history { border-color: var(--working); color: var(--working); background: var(--working-dim); }

    /* Theme toggle — explicit override that persists in localStorage; absent
       value defers to the OS prefers-color-scheme media query. */
    .theme-toggle {
      background: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--muted);
      font-size: 12px;
      width: 26px;
      height: 22px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .theme-toggle:hover { border-color: var(--working); color: var(--text-bright); }

    .ws-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.03em;
      color: var(--muted);
    }

    /* Filled dot mirrors overlay's statusIndicator at SessionListView.swift:366.
       Color/label combos: green/"watching" (connected),
       orange/"reconnecting"/"connecting", red/"disconnected". */
    .ws-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--ws-disconnected);
      box-shadow: 0 0 4px rgba(255, 59, 48, 0.4);
      transition: background 0.3s, box-shadow 0.3s;
    }

    .ws-dot.connected {
      background: var(--ws-connected);
      box-shadow: 0 0 4px rgba(52, 199, 89, 0.5);
    }

    .ws-dot.connecting,
    .ws-dot.reconnecting {
      background: var(--waiting);
      box-shadow: 0 0 4px rgba(255, 149, 0, 0.5);
      animation: ws-pulse 1.2s ease-in-out infinite;
    }

    @keyframes ws-pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.45; transform: scale(0.85); }
    }

    main {
      position: relative;
      z-index: 1;
      padding: 12px 20px;
      max-width: 1200px;
      margin: 0 auto;
    }

    /* Empty state */
    #empty-state {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 100px 24px;
      color: var(--muted);
    }

    .empty-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--muted);
      opacity: 0.4;
      animation: empty-breathe 3s ease-in-out infinite;
      margin-bottom: 16px;
    }

    @keyframes empty-breathe {
      0%, 100% { opacity: 0.15; transform: scale(0.9); }
      50% { opacity: 0.5; transform: scale(1.1); }
    }

    #empty-state p {
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    /* --- Timeline heatmap --- */
    /* Per-row history bar — visible only in history modes; takes the same
       slot the context bar occupies in Context mode. Floor mirrors macOS
       HistoryBarView (SessionListView.swift:555) at 132×16, grown by the
       same flex factors as .row-ctx-bar so the bar can absorb slack. */
    .row-history {
      flex: 2 1 100px;
      min-width: 100px;
      max-width: 320px;
      height: 16px;
      border-radius: 3px;
      overflow: hidden;
    }

    /* --- Session list --- */
    .session-list {
      display: flex;
      flex-direction: column;
    }

    /* Group header */
    .group-hdr {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px 4px;
      cursor: pointer;
      user-select: none;
    }

    .group-hdr:hover { background: var(--surface-hover); border-radius: 4px; }

    .group-chevron {
      font-size: 8px;
      color: var(--muted);
      width: 10px;
      text-align: center;
      transition: transform 0.15s;
    }

    .group-chevron.collapsed { transform: rotate(-90deg); }

    .group-name {
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 700;
      color: var(--text-bright);
      letter-spacing: 0.02em;
    }

    .group-cost {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--muted);
      margin-left: 8px;
      cursor: pointer;
      user-select: none;
    }

    .group-cost:hover {
      color: var(--text-bright);
    }

    .group-count {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--muted);
      margin-left: auto;
    }

    /* Session row — strict one-line layout. The branch column owns excess
       width and ellipsises long names; all other columns are fixed so the
       meta cluster (bar/tokens/cost/model/icon) never wraps onto a second
       line. The macOS overlay row uses the same rule (one HStack, no
       wrapping). */
    .session-row {
      display: flex;
      align-items: center;
      flex-wrap: nowrap;
      gap: 5px;
      padding: 3px 10px;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text);
      border-radius: 3px;
      min-width: 0;
      /* Pin to the height the history bar (16) takes so toggling Context↔
         history modes doesn't shift the row. Mirrors macOS row pin at
         SessionListView.swift:586 (`.frame(minHeight: 16)`). */
      min-height: 22px;
      transition: background 0.12s;
      opacity: 0;
      animation: row-reveal 0.2s ease forwards;
    }

    .session-row:hover { background: var(--surface-hover); }

    @keyframes row-reveal {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .session-row.child { padding-left: 30px; }

    .row-state-icon {
      width: 12px;
      height: 12px;
      flex-shrink: 0;
    }

    .row-state-icon svg {
      width: 12px;
      height: 12px;
      display: block;
    }

    .row-adapter-icon {
      width: 12px;
      height: 12px;
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .row-adapter-icon img {
      width: 12px;
      height: 12px;
      display: block;
    }

    /* Reduced-motion: hide the animated halo so only the steady inner dot
       remains. SMIL doesn't honor prefers-reduced-motion natively, so we
       hide the halo element via CSS. */
    @media (prefers-reduced-motion: reduce) {
      .row-state-icon svg circle.halo,
      .app-state-icon svg circle.halo {
        display: none;
      }
    }

    .row-num {
      width: 12px;
      font-size: 9px;
      font-weight: 500;
      color: var(--muted);
      text-align: right;
      flex-shrink: 0;
    }

    .row-branch {
      color: var(--text);
      font-size: 10px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      /* Floor mirrors macOS row (SessionListView.swift:501) at 64 px; on
         wider viewports the branch grows to use the slack so long names
         don't ellipsis-truncate when there's plenty of room. Capped so an
         extreme-wide window doesn't dedicate half the row to the branch. */
      flex: 1 1 64px;
      min-width: 64px;
      max-width: 220px;
    }
    .session-row.has-sub .row-branch { flex: 1 1 44px; min-width: 44px; }

    /* Small subagent count badge — filled circle with running-count number,
       sized to fit alongside the row's mono text. Mirrors macOS at
       SessionListView.swift:481-490. */
    .row-sub-badge {
      width: 14px;
      height: 14px;
      flex: 0 0 14px;
      border-radius: 50%;
      background: var(--working);
      color: #fff;
      font-size: 9px;
      font-weight: 700;
      line-height: 14px;
      text-align: center;
      font-family: var(--font-sans);
    }

    .row-spacer { flex: 1 1 auto; min-width: 4px; }

    /* Context bar — floor mirrors macOS ContextBar at SessionListView.swift:420
       (100×13). On wider viewports the bar grows to use the slack so the
       fill is more readable, capped so it doesn't dominate the row. The
       grow factor is higher than branch's so the bar absorbs more slack. */
    .row-ctx-bar {
      position: relative;
      height: 13px;
      flex: 2 1 100px;
      min-width: 100px;
      max-width: 320px;
      background: var(--ctx-bar-track);
      border-radius: 3px;
      overflow: hidden;
    }

    .row-ctx-fill {
      display: block;
      height: 100%;
      border-radius: 3px;
      background: var(--pressure-low);
      transition: width 0.4s ease, background 0.3s;
    }

    .row-ctx-fill.medium  { background: var(--pressure-medium); }
    .row-ctx-fill.high    { background: var(--pressure-high); }
    .row-ctx-fill.critical { background: var(--pressure-critical); }

    /* Token count overlay sits on top of the bar and right-aligns. Color
       picks the muted token for readability over both the unfilled track
       and the filled portion (which is solid green). */
    .row-ctx-label {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0 4px;
      font-family: var(--font-mono);
      font-size: 9px;
      font-weight: 500;
      font-variant-numeric: tabular-nums;
      color: var(--muted);
      pointer-events: none;
    }

    /* Standalone context % column — only shown when Settings.showCostDisplay
       is OFF (so the cost column hides and we surface percentage instead). */
    .row-ctx-pct {
      font-size: 10px;
      flex: 0 0 auto;
      font-variant-numeric: tabular-nums;
      min-width: 38px;
      text-align: right;
      color: var(--muted);
    }
    body:not(.no-cost) .row-ctx-pct { display: none; }

    .row-cost {
      font-size: 10px;
      font-weight: 500;
      color: var(--text);
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
      min-width: 48px;
      text-align: right;
    }

    .row-model {
      font-size: 10px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 120px;
    }

    .row-elapsed {
      font-size: 9px;
      color: var(--muted);
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
      min-width: 36px;
      text-align: right;
    }

    .row-id {
      font-size: 9px;
      color: var(--muted);
      opacity: 0.5;
      flex-shrink: 0;
    }

    /* Waiting-question row — assistant's last message rendered beneath
       the parent when the session is awaiting user input. Mirrors macOS
       layout at SessionListView.swift:588-604 (waiting-colored text in a
       padded, dim, rounded box, clamped to 3 lines). */
    .row-question-row {
      margin: 0 10px 4px 24px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      font-family: var(--font-mono);
      font-size: 10px;
      line-height: 1.4;
      color: var(--waiting);
      background: var(--waiting-dim);
      padding: 4px 6px;
      border-radius: 4px;
      cursor: default;
    }
    .row-question-row.child { margin-left: 44px; }

    /* Task progress dots — rendered as a separate row beneath the parent
       session row (see .row-tasks-row), mirroring TaskListView in the macOS
       overlay (SessionListView.swift:746-769). */
    .task-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
      cursor: default;
    }
    .task-dot.task-pending    { background: transparent; border: 1.5px solid var(--working); }
    .task-dot.task-in_progress { background: transparent; border: 1.5px solid var(--working); }
    .task-dot.task-completed  { background: var(--ready); border: 1.5px solid var(--ready); }

    .row-tasks-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 1px 10px 4px 24px;
      font-family: var(--font-mono);
      font-size: 9px;
    }
    .row-tasks-row.child { padding-left: 44px; }
    .row-tasks-dots {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 3px;
      flex: 1 1 auto;
      min-width: 0;
    }
    .row-tasks-counter {
      color: var(--muted);
      flex-shrink: 0;
      min-width: 38px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    /* Subagent dot-matrix indicator — rendered under a session row when it
       has running sub-agents. Open circles = pending, filled = settled.
       Mirrors overlay anatomy in assets/overlay-reference.png. */
    .sub-matrix-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 1px 10px 4px 24px;
      font-family: var(--font-mono);
      font-size: 9px;
    }
    .sub-matrix-row.child { padding-left: 44px; }
    .sub-matrix-counter {
      color: var(--muted);
      flex-shrink: 0;
      min-width: 38px;
      text-align: right;
      font-variant-numeric: tabular-nums;
      padding-top: 2px;
    }
    .sub-matrix-dots {
      display: grid;
      grid-template-columns: repeat(auto-fill, 10px);
      gap: 3px;
      flex: 1;
    }
    .sub-matrix-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      box-sizing: border-box;
    }
    .sub-matrix-dot.settled {
      background: var(--sub-dot-filled);
    }
    .sub-matrix-dot.open {
      background: transparent;
      border: 1.5px solid var(--sub-dot-open);
    }

    /* Connection banner — surfaces when the WebSocket is reconnecting or
       disconnected. Mirrors the inline error display in
       SessionListView.swift:207-210. Hidden when connected (default). */
    #connection-banner {
      display: none;
      font-family: var(--font-mono);
      font-size: 11px;
      padding: 6px 10px;
      margin-bottom: 8px;
      border-radius: 4px;
      border: 1px solid transparent;
    }
    #connection-banner.reconnecting {
      display: block;
      background: var(--waiting-dim);
      border-color: rgba(255, 149, 0, 0.4);
      color: var(--waiting);
    }
    #connection-banner.disconnected {
      display: block;
      background: rgba(255, 59, 48, 0.1);
      border-color: rgba(255, 59, 48, 0.4);
      color: var(--pressure-high);
    }

    /* Pressure alert row */
    .pressure-alert-row {
      padding: 2px 10px 2px 30px;
      font-family: var(--font-mono);
      font-size: 9px;
    }
    .pressure-alert-row span {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 3px;
    }
    .pressure-alert-row .alert-high {
      background: rgba(255, 59, 48, 0.1);
      color: var(--pressure-high);
    }
    .pressure-alert-row .alert-critical {
      background: rgba(215, 0, 21, 0.12);
      color: var(--pressure-critical);
    }

    /* Gas Town section */
    .gt-section {
      margin-bottom: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }

    .gt-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border-subtle);
    }

    .gt-title {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 700;
      color: var(--text-bright);
      letter-spacing: 0.04em;
    }

    .gt-title .gt-emoji { font-size: 12px; }

    .gt-status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      display: inline-block;
    }

    .gt-status-label {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .gt-body { padding: 0; }

    .gt-convoy-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-bottom: 1px solid var(--border-subtle);
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .gt-convoy-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 12px 4px 24px;
      border-bottom: 1px solid var(--border-subtle);
      font-family: var(--font-mono);
      font-size: 10px;
    }

    .gt-convoy-row:last-child { border-bottom: none; }

    .gt-convoy-name {
      color: var(--text);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .gt-convoy-name.done { color: var(--muted); }

    .gt-dotbar {
      letter-spacing: 2px;
      font-size: 10px;
      flex-shrink: 0;
    }

    .gt-convoy-fraction {
      font-size: 10px;
      color: var(--muted);
      flex-shrink: 0;
      min-width: 36px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .gt-convoy-check {
      color: var(--ready);
      font-size: 10px;
      flex-shrink: 0;
    }

    /* Role badge on session rows */
    .row-role-badge {
      font-size: 10px; padding: 0 5px; height: 14px; border-radius: 3px;
      background: rgba(139, 92, 246, 0.12); color: var(--working);
      font-family: var(--font-mono); font-weight: 600;
      display: flex; align-items: center; white-space: nowrap;
      flex: 0 1 auto; min-width: 0; overflow: hidden; text-overflow: ellipsis;
      max-width: 100px;
    }
    /* Active tool indicator — hidden for now (the overlay doesn't surface it
       in the default row either). Keep the rule + JS update path so we can
       re-enable later, but force-hide via CSS. */
    .row-tool {
      display: none !important;
    }
    /* Gas Town hierarchy */
    .gt-agents-row {
      display: flex; align-items: center; gap: 8px;
      padding: 5px 12px; border-bottom: 1px solid var(--border-subtle); flex-wrap: wrap;
    }
    .gt-agent-chip {
      display: flex; align-items: center; gap: 5px;
      font-family: var(--font-mono); font-size: 10px; color: var(--text);
      padding: 2px 7px; border-radius: 3px;
      background: var(--surface-hover); border: 1px solid var(--border-subtle); cursor: default;
    }
    .gt-chip-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
    .gt-chip-id { font-size: 9px; color: var(--muted); }
    .gt-rig-block { padding: 5px 12px; border-bottom: 1px solid var(--border-subtle); }
    .gt-rig-block:last-of-type { border-bottom: none; }
    .gt-rig-name {
      font-family: var(--font-mono); font-size: 9px; font-weight: 700;
      color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 4px;
    }
    .gt-workers { display: flex; flex-wrap: wrap; gap: 4px; }

    /* Responsive — context bar is the load-bearing signal and never hides.
       Breakpoints sized to the actual minimum width of fixed columns plus
       gaps + padding (~400 px for everything visible; trim from there). */
    @media (max-width: 768px) {
      header { padding: 10px 14px; }
      main { padding: 10px 14px; }
      .row-model { max-width: 70px; }
      .app-title .app-sep { display: none; }
    }

    @media (max-width: 420px) {
      header { flex-wrap: wrap; gap: 8px; }
      main { padding: 8px 10px; }
      .row-cost { display: none; }
      .app-state-icons { display: none; }
    }

    @media (max-width: 360px) {
      .row-model { display: none; }
    }

    @media (max-width: 320px) {
      .row-adapter-icon { display: none; }
    }

    /* Display modes — driven by the single header cycling button. Context is
       the default (show meta columns, hide history bar); 1s/10s/60s history
       modes swap that. body.view-history is the umbrella class for any
       history granularity. */
    .row-history { display: none; }
    body.view-history .row-ctx-bar { display: none !important; }
    body.view-history .row-ctx-pct { display: none !important; }
    body.view-history .row-cost    { display: none !important; }
    body.view-history .row-model   { display: none !important; }
    body.view-history .row-history { display: block !important; }

    /* Settings-driven visibility (mirrors macOS SettingsView toggles).
       - showCostDisplay: when off, hide the cost column (default on).
       - debugMode: when off, hide the trailing row-id, row-elapsed, and
         row-created chips (timestamps + ID are dev-only info, just like
         the macOS overlay). */
    body.no-cost .row-cost { display: none !important; }
    body:not(.debug-mode) .row-id      { display: none !important; }
    body:not(.debug-mode) .row-elapsed { display: none !important; }
    body:not(.debug-mode) .row-created { display: none !important; }
    .row-created {
      font-size: 9px;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      flex: 0 0 auto;
    }

    /* Settings modal */
    .settings-modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .settings-modal-backdrop.open { display: flex; }
    .settings-modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 18px 18px 14px;
      width: 100%;
      max-width: 420px;
      max-height: calc(100vh - 48px);
      overflow: auto;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
    }
    .settings-modal h2 {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .settings-modal h2:not(:first-child) { margin-top: 14px; }
    .settings-modal label {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 6px 4px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      color: var(--text);
    }
    .settings-modal label:hover { background: var(--surface-hover); }
    .settings-modal label input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      width: 30px;
      height: 16px;
      border-radius: 8px;
      background: var(--border);
      position: relative;
      cursor: pointer;
      flex-shrink: 0;
      margin-top: 1px;
      transition: background 0.15s;
    }
    .settings-modal label input[type="checkbox"]::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--text-bright);
      transition: left 0.15s, background 0.15s;
    }
    .settings-modal label input[type="checkbox"]:checked {
      background: var(--working);
    }
    .settings-modal label input[type="checkbox"]:checked::after {
      left: 16px;
      background: #ffffff;
    }
    .settings-modal .settings-label-text { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
    .settings-modal .settings-label-text .settings-title { color: var(--text-bright); font-weight: 500; }
    .settings-modal .settings-label-text .settings-hint { color: var(--muted); font-size: 11px; }
    .settings-modal .settings-modal-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-top: 14px;
      padding-top: 10px;
      border-top: 1px solid var(--border-subtle);
    }
    .settings-modal .settings-modal-footer .settings-perm-note {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--muted);
      flex: 1;
    }
    .settings-modal .settings-modal-close {
      background: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 11px;
      padding: 4px 12px;
      cursor: pointer;
    }
    .settings-modal .settings-modal-close:hover { border-color: var(--working); color: var(--text-bright); }
  </style>
</head>
<body>
  <header>
    <div class="header-left">
      <div class="app-title">
        <span class="app-name">Irrlicht</span>
        <span class="app-version" id="app-version"></span>
        <span class="app-sep">—</span>
      </div>
      <div class="app-state-icons" id="app-state-icons" aria-label="Active sessions"></div>
    </div>
    <div class="header-right">
      <button class="view-mode-cycle" id="view-mode-cycle" type="button"
              title="Cycle Context / 1 Min / 10 Min / 60 Min">Context</button>
      <button class="theme-toggle" id="theme-toggle" type="button"
              title="Toggle light/dark theme" aria-label="Toggle theme">☾</button>
      <button class="theme-toggle" id="settings-toggle" type="button"
              title="Settings" aria-label="Settings">⚙</button>
      <div class="ws-status" role="status" aria-live="polite">
        <div class="ws-dot connecting" id="ws-dot"></div>
        <span id="ws-label">connecting</span>
      </div>
    </div>
  </header>

  <div class="settings-modal-backdrop" id="settings-backdrop" role="dialog" aria-modal="true" aria-label="Settings">
    <div class="settings-modal">
      <h2>Display</h2>
      <label>
        <input type="checkbox" data-setting="showCostDisplay">
        <span class="settings-label-text">
          <span class="settings-title">Show cost</span>
          <span class="settings-hint">Display the per-session running cost in each row.</span>
        </span>
      </label>
      <label>
        <input type="checkbox" data-setting="debugMode">
        <span class="settings-label-text">
          <span class="settings-title">Debug mode</span>
          <span class="settings-hint">Show session IDs and elapsed time in each row.</span>
        </span>
      </label>

      <h2>Notifications</h2>
      <label>
        <input type="checkbox" data-setting="notifyOnReady">
        <span class="settings-label-text">
          <span class="settings-title">Notify when a session becomes ready</span>
          <span class="settings-hint">A finished turn is ready for your next prompt.</span>
        </span>
      </label>
      <label>
        <input type="checkbox" data-setting="notifyOnWaiting">
        <span class="settings-label-text">
          <span class="settings-title">Notify when a session is waiting on me</span>
          <span class="settings-hint">The agent asked a question or paused for approval.</span>
        </span>
      </label>
      <label>
        <input type="checkbox" data-setting="notifyOnContextPressure">
        <span class="settings-label-text">
          <span class="settings-title">Notify on context pressure</span>
          <span class="settings-hint">Heads-up when a session approaches its context limit.</span>
        </span>
      </label>

      <div class="settings-modal-footer">
        <span class="settings-perm-note" id="settings-perm-note"></span>
        <button class="settings-modal-close" id="settings-close" type="button">Done</button>
      </div>
    </div>
  </div>

  <main>
    <div id="connection-banner" role="alert" aria-live="polite"></div>
    <div id="gt-container" style="display:none" aria-label="Gas Town"></div>
    <div id="empty-state">
      <div class="empty-dot"></div>
      <p>awaiting sessions</p>
    </div>
    <div class="session-list" id="session-list" aria-live="polite"></div>
  </main>

  <script>
    // --- State ---
    let dashboardGroups = [];
    let orchestrator = null;   // OrchestratorSummary from initial load
    let orchFull = null;       // Full orchestrator.State (global_agents, codebases) from WS / secondary fetch
    // Adapter branding from /api/v1/agents — keyed by adapter `name`
    // (e.g. "claude-code"). Populated once on initial load; the daemon's
    // registry is essentially static (changes require a daemon restart).
    let agentRegistry = {};
    let sessionIndex = new Map();
    // Collapsed group names persist across reloads so a deliberate collapse
    // survives a refresh. Restored from localStorage on load.
    let collapsedGroups = new Set();
    try {
      const raw = localStorage.getItem('irrlicht_collapsedGroups');
      if (raw) {
        const parsed = JSON.parse(raw);
        if (Array.isArray(parsed)) collapsedGroups = new Set(parsed.filter(s => typeof s === 'string'));
      }
    } catch (e) {}
    function persistCollapsedGroups() {
      try { localStorage.setItem('irrlicht_collapsedGroups', JSON.stringify([...collapsedGroups])); } catch (e) {}
    }

    // --- Theme ---
    // The explicit override (localStorage["irrlicht_theme"] = "light" | "dark")
    // sets data-theme on <html>, which the CSS @media (prefers-color-scheme)
    // rules respect. Absent override → follow OS preference.
    const themeKey = 'irrlicht_theme';
    function storedTheme() {
      const t = localStorage.getItem(themeKey);
      return (t === 'light' || t === 'dark') ? t : null;
    }
    function resolvedTheme() {
      const t = storedTheme();
      if (t) return t;
      return (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) ? 'light' : 'dark';
    }
    function applyStoredTheme() {
      const t = storedTheme();
      if (t) document.documentElement.setAttribute('data-theme', t);
      else document.documentElement.removeAttribute('data-theme');
      updateThemeToggleGlyph();
    }
    function updateThemeToggleGlyph() {
      const btn = document.getElementById('theme-toggle');
      if (!btn) return;
      // ☀ when current theme is dark (clicking switches to light)
      // ☾ when current theme is light (clicking switches to dark)
      btn.textContent = resolvedTheme() === 'dark' ? '☀' : '☾';
    }
    function toggleTheme() {
      const next = resolvedTheme() === 'dark' ? 'light' : 'dark';
      localStorage.setItem(themeKey, next);
      applyStoredTheme();
      // Re-render so adapter icons pick up the new light/dark variant.
      for (const el of document.querySelectorAll('.session-row')) {
        el.dataset.adapterPopulated = '0';
      }
      render();
    }
    applyStoredTheme();
    if (window.matchMedia) {
      const mq = window.matchMedia('(prefers-color-scheme: light)');
      const onChange = () => {
        if (!storedTheme()) { updateThemeToggleGlyph(); render(); }
      };
      if (mq.addEventListener) mq.addEventListener('change', onChange);
      else if (mq.addListener) mq.addListener(onChange);
    }

    // --- Display mode (Context / 1 Min / 10 Min / 60 Min) ---
    // Single cycling toggle in the header replaces the standalone view-mode
    // bar and the timeline-granularity buttons. Mirrors overlay's
    // DisplayMode enum at SessionListView.swift:148.
    const DISPLAY_MODES = [
      { key: 'context', label: 'Context', isHistory: false, granularity: 1  },
      { key: '1min',    label: '1 Min',   isHistory: true,  granularity: 1  },
      { key: '10min',   label: '10 Min',  isHistory: true,  granularity: 10 },
      { key: '60min',   label: '60 Min',  isHistory: true,  granularity: 60 },
    ];
    let currentDisplayMode = localStorage.getItem('irrlicht_displayMode') || 'context';
    if (!DISPLAY_MODES.find(m => m.key === currentDisplayMode)) currentDisplayMode = 'context';
    function currentMode() {
      return DISPLAY_MODES.find(m => m.key === currentDisplayMode) || DISPLAY_MODES[0];
    }
    function applyDisplayMode() {
      const m = currentMode();
      const btn = document.getElementById('view-mode-cycle');
      if (btn) {
        btn.textContent = m.label;
        btn.classList.toggle('history', m.isHistory);
      }
      document.body.classList.toggle('view-history', m.isHistory);
      if (m.isHistory) applyGranularity(m.granularity);
      // Repaint so the timeline panel and per-row history canvases match the
      // new mode (canvases need offsetWidth>0 before painting; the panel
      // hides outside history modes).
      repaintHistory();
    }
    function cycleDisplayMode() {
      const idx = DISPLAY_MODES.findIndex(m => m.key === currentDisplayMode);
      currentDisplayMode = DISPLAY_MODES[(idx + 1) % DISPLAY_MODES.length].key;
      localStorage.setItem('irrlicht_displayMode', currentDisplayMode);
      applyDisplayMode();
    }

    // --- Settings ---
    // Mirrors the macOS app's SettingsView (platforms/macos/Irrlicht/Views/
    // SettingsView.swift). Defaults match @AppStorage defaults in Swift:
    // showCostDisplay defaults on; debug + notify toggles default off.
    // `launchAtLogin` and per-event sound pickers don't apply to the web view.
    const SETTINGS_KEY = 'irrlicht_settings';
    const SETTINGS_DEFAULTS = {
      debugMode: false,
      showCostDisplay: true,
      notifyOnReady: false,
      notifyOnWaiting: false,
      notifyOnContextPressure: false,
    };
    function loadSettings() {
      try {
        const raw = localStorage.getItem(SETTINGS_KEY);
        if (!raw) return Object.assign({}, SETTINGS_DEFAULTS);
        const parsed = JSON.parse(raw);
        return Object.assign({}, SETTINGS_DEFAULTS, (parsed && typeof parsed === 'object') ? parsed : {});
      } catch (e) {
        return Object.assign({}, SETTINGS_DEFAULTS);
      }
    }
    let settings = loadSettings();
    function persistSettings() {
      try { localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings)); } catch (e) {}
    }
    function applySettings() {
      document.body.classList.toggle('no-cost', !settings.showCostDisplay);
      document.body.classList.toggle('debug-mode', !!settings.debugMode);
    }
    applySettings();

    // --- Notifications ---
    // tryNotify gates browser notifications behind: matching settings toggle,
    // permission grant, and tab being hidden (so we don't ping while the user
    // is actively looking at the dashboard). Mirrors what the macOS app would
    // surface via UNUserNotificationCenter.
    const lastNotifiedPressure = new Map();
    function tryNotify(toggleKey, title, body) {
      if (!settings[toggleKey]) return;
      if (typeof Notification === 'undefined') return;
      if (Notification.permission !== 'granted') return;
      if (document.visibilityState === 'visible') return;
      try { new Notification(title, { body: body || '', tag: 'irrlicht-' + toggleKey, silent: false }); } catch (e) {}
    }
    function rowLabel(s) {
      // Best-effort "project · branch" label that matches what the row shows.
      const proj = s && s.project_name ? s.project_name : '';
      const branch = s && s.git_branch ? s.git_branch : '';
      if (proj && branch) return proj + ' · ' + branch;
      return proj || branch || (s && s.session_id ? s.session_id.slice(0, 8) : 'session');
    }
    function maybeNotifyOnUpdate(prev, next) {
      if (!next) return;
      const prevState    = prev ? prev.state : '';
      const prevPressure = (prev && prev.metrics) ? prev.metrics.pressure_level : '';
      const nextState    = next.state || '';
      const nextPressure = (next.metrics && next.metrics.pressure_level) || '';
      const sid          = next.session_id;
      const label        = rowLabel(next);

      if (nextState === 'ready' && prevState !== 'ready') {
        tryNotify('notifyOnReady', 'Session ready', label);
      } else if (nextState === 'waiting' && prevState !== 'waiting') {
        tryNotify('notifyOnWaiting', 'Awaiting input', label);
      }

      const isHigh = nextPressure === 'warning' || nextPressure === 'critical';
      const wasHigh = prevPressure === 'warning' || prevPressure === 'critical';
      const lastFor = sid ? lastNotifiedPressure.get(sid) : null;
      if (isHigh && (!wasHigh || lastFor !== nextPressure)) {
        const title = nextPressure === 'critical' ? 'Context pressure: critical' : 'Context pressure: high';
        tryNotify('notifyOnContextPressure', title, label + ' — switch to a fresh session soon');
        if (sid) lastNotifiedPressure.set(sid, nextPressure);
      } else if (!isHigh && sid && lastNotifiedPressure.has(sid)) {
        lastNotifiedPressure.delete(sid);
      }
    }

    // --- Cost timeframes ---
    const COST_TIMEFRAMES = [
      { key: 'day',   suffix: '/d'  },
      { key: 'week',  suffix: '/w'  },
      { key: 'month', suffix: '/mo' },
      { key: 'year',  suffix: '/yr' },
    ];
    let currentTimeframe = localStorage.getItem('irrlicht_costTimeframe') || 'day';
    if (!COST_TIMEFRAMES.find(t => t.key === currentTimeframe)) currentTimeframe = 'day';

    // --- Timeline / history state (WebSocket-streamed, see history_snapshot/tick/upgrade) ---
    let timelineHistory = new Map(); // session_id -> {label, states: string[]} for the active granularity
    // Derived from the display-mode cycle (`currentMode().granularity`); see
    // applyDisplayMode → applyGranularity below.
    let currentGranularity = 1;
    let currentBucketCount = 60;
    // historyByGranularity[g][sessionID] is a 60-element oldest→newest array of state names
    // (or "" for no-data buckets). Mirrored from the daemon's bit-packed wire format.
    // Inner dicts are null-prototype so server-supplied keys can never reach Object.prototype.
    const historyByGranularity = {1: Object.create(null), 10: Object.create(null), 60: Object.create(null)};
    // lastTickGen[sessionID][granularity] = highest applied tick generation. Lets us drop
    // a tick that's already reflected in our snapshot (closing the connect-time race).
    const lastTickGen = Object.create(null);

    const HISTORY_PRIORITY_TO_STATE = ['ready', 'working', 'waiting', ''];
    function historyPriorityForState(s) {
      switch (s) {
        case 'waiting': return 2;
        case 'working': return 1;
        case 'ready':   return 0;
        default:        return -1;
      }
    }
    function decodeHistoryBuckets(b64) {
      // Daemon ships 60 buckets × 2 bits MSB-first = 15 bytes = 20 base64 chars.
      let raw;
      try { raw = atob(b64); } catch (e) { return null; }
      if (raw.length !== 15) return null;
      const out = new Array(60);
      for (let i = 0; i < 15; i++) {
        const byte = raw.charCodeAt(i);
        out[i * 4 + 0] = HISTORY_PRIORITY_TO_STATE[(byte >> 6) & 0x3];
        out[i * 4 + 1] = HISTORY_PRIORITY_TO_STATE[(byte >> 4) & 0x3];
        out[i * 4 + 2] = HISTORY_PRIORITY_TO_STATE[(byte >> 2) & 0x3];
        out[i * 4 + 3] = HISTORY_PRIORITY_TO_STATE[byte & 0x3];
      }
      return out;
    }

    // Rebuild `timelineHistory` from the chosen granularity dict. The renderer
    // expects `states` to omit leading no-data slots so the bar right-anchors.
    function rebuildTimelineHistory() {
      const dict = historyByGranularity[currentGranularity] || Object.create(null);
      const newMap = new Map();
      for (const sid of Object.keys(dict)) {
        const buckets = dict[sid];
        let i = 0;
        while (i < buckets.length && buckets[i] === '') i++;
        const states = buckets.slice(i);
        const entry = sessionIndex.get(sid);
        const label = entry
          ? (entry.agent.project_name || '').slice(0, 10) + ' ' + shortID(sid)
          : shortID(sid);
        newMap.set(sid, {label, states});
      }
      timelineHistory = newMap;
    }

    function applyHistorySnapshot(sessionID, history, generations) {
      for (const granKey of Object.keys(history)) {
        const gran = parseInt(granKey, 10);
        if (![1, 10, 60].includes(gran)) continue;
        const buckets = decodeHistoryBuckets(history[granKey]);
        if (!buckets) continue;
        historyByGranularity[gran][sessionID] = buckets;
      }
      // Seed the dedup high-water-mark from the snapshot so any tick already
      // folded into this snapshot gets skipped on arrival.
      if (generations) {
        const perGran = lastTickGen[sessionID] || Object.create(null);
        for (const granKey of Object.keys(generations)) {
          const gran = parseInt(granKey, 10);
          if (gran === 1 || gran === 10 || gran === 60) perGran[gran] = generations[granKey];
        }
        lastTickGen[sessionID] = perGran;
      }
      rebuildTimelineHistory();
    }

    function applyHistoryTick(granularitySec, buckets, bucketGenerations) {
      if (![1, 10, 60].includes(granularitySec)) return;
      const dict = historyByGranularity[granularitySec];
      let changed = false;
      for (const sid of Object.keys(buckets)) {
        // Skip if this tick has already been folded into our snapshot.
        if (bucketGenerations && bucketGenerations[sid] !== undefined) {
          const gen = bucketGenerations[sid];
          const last = (lastTickGen[sid] && lastTickGen[sid][granularitySec]) || 0;
          if (gen <= last) continue;
          if (!lastTickGen[sid]) lastTickGen[sid] = Object.create(null);
          lastTickGen[sid][granularitySec] = gen;
        }
        let arr = dict[sid];
        if (!arr) arr = new Array(60).fill('');
        arr.shift();
        arr.push(HISTORY_PRIORITY_TO_STATE[buckets[sid] & 0x3]);
        while (arr.length < 60) arr.unshift('');
        dict[sid] = arr;
        changed = true;
      }
      if (changed && granularitySec === currentGranularity) rebuildTimelineHistory();
    }

    function applyHistoryUpgrade(sessionID, priority) {
      const newState = HISTORY_PRIORITY_TO_STATE[priority & 0x3];
      const newPrio = historyPriorityForState(newState);
      let changedActive = false;
      for (const gran of [1, 10, 60]) {
        const arr = historyByGranularity[gran][sessionID];
        if (!arr || arr.length === 0) continue;
        const lastPrio = historyPriorityForState(arr[arr.length - 1]);
        if (newPrio > lastPrio) {
          arr[arr.length - 1] = newState;
          if (gran === currentGranularity) changedActive = true;
        }
      }
      if (changedActive) rebuildTimelineHistory();
    }

    // --- SVG Icons (compact 12px) ---
    const svgIcons = {
      working: '<svg viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="2.6" fill="#8B5CF6"/><circle class="halo" cx="10" cy="10" r="3" fill="none" stroke="#8B5CF6" stroke-width="1.5"><animate attributeName="r" values="3;9" dur="1.6s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.85;0" dur="1.6s" repeatCount="indefinite"/><animate attributeName="stroke-width" values="1.5;0.4" dur="1.6s" repeatCount="indefinite"/></circle></svg>',
      waiting: '<svg viewBox="0 0 16 16" fill="none"><rect x="4" y="3" width="2.5" height="10" rx="1" fill="#FF9500"/><rect x="9.5" y="3" width="2.5" height="10" rx="1" fill="#FF9500"/></svg>',
      ready: '<svg viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6.5" stroke="#34C759" stroke-width="1.5"/><path d="M5 8.2l2 2 4-4.4" stroke="#34C759" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>',
      cancelled: '<svg viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6.5" stroke="#8E8E93" stroke-width="1.5"/><path d="M5.5 5.5l5 5M10.5 5.5l-5 5" stroke="#8E8E93" stroke-width="1.5" stroke-linecap="round"/></svg>',
    };

    function stateIcon(state) { return svgIcons[state] || svgIcons.ready; }

    // --- Helpers ---
    function shortModel(m) {
      if (!m || m === 'unknown') return '';
      return m.replace(/^claude-/, '').replace(/-(\d)/, '.$1');
    }

    function formatCost(usd) {
      if (!usd || usd <= 0) return '';
      return '$' + usd.toFixed(2);
    }

    function fmtDuration(secs) {
      const h = Math.floor(secs / 3600);
      const m = Math.floor((secs % 3600) / 60);
      const s = secs % 60;
      if (h > 0) return h + 'h' + m + 'm';
      if (m > 0) return m + 'm' + s + 's';
      return s + 's';
    }

    function formatElapsed(firstSeen, elapsedStored, isActive) {
      if (isActive && firstSeen) {
        return fmtDuration(Math.max(0, Math.floor(Date.now() / 1000 - firstSeen)));
      }
      if (elapsedStored && elapsedStored > 0) return fmtDuration(elapsedStored);
      return '';
    }

    function shortID(id) { return id ? id.slice(0, 6) : ''; }

    function pressureClass(level) {
      if (level === 'critical') return 'critical';
      if (level === 'warning' || level === 'high') return 'high';
      if (level === 'caution' || level === 'medium') return 'medium';
      return '';
    }

    function pressureColor(level) {
      if (level === 'critical') return 'var(--pressure-critical)';
      if (level === 'warning' || level === 'high') return 'var(--pressure-high)';
      if (level === 'caution' || level === 'medium') return 'var(--pressure-medium)';
      return 'var(--pressure-low)';
    }

    function formatTokens(n) {
      if (n < 1000) return n + '';
      if (n < 1000000) return (n / 1000).toFixed(1) + 'K';
      return (n / 1000000).toFixed(1) + 'M';
    }

    function esc(s) {
      if (s == null) return '';
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function groupMaxPressure(g) {
      let worst = 0;
      for (const a of g.agents) {
        const ctx = a.metrics ? a.metrics.context_utilization_percentage || 0 : 0;
        if (ctx > worst) worst = ctx;
      }
      return worst;
    }

    function groupTotalCost(g) {
      let total = 0;
      for (const a of g.agents) {
        if (a.metrics && a.metrics.estimated_cost_usd) total += a.metrics.estimated_cost_usd;
        for (const c of (a.children || [])) {
          if (c.metrics && c.metrics.estimated_cost_usd) total += c.metrics.estimated_cost_usd;
        }
      }
      return total;
    }

    function activeSubagentCount(a) {
      if (!a.children) return 0;
      return a.children.filter(c => c.state === 'working' || c.state === 'waiting').length;
    }

    // --- Session index ---
    function rebuildIndex() {
      sessionIndex.clear();
      for (const g of dashboardGroups) {
        for (const a of g.agents) {
          sessionIndex.set(a.session_id, {group: g, agent: a, parent: null});
          indexChildren(g, a);
        }
      }
    }
    function indexChildren(group, parent) {
      if (!parent.children) return;
      for (const c of parent.children) {
        sessionIndex.set(c.session_id, {group: group, agent: c, parent: parent});
        indexChildren(group, c);
      }
    }

    function applySessionUpdate(s) {
      var entry = sessionIndex.get(s.session_id);
      if (entry) {
        var a = entry.agent;
        // Capture previous state + pressure before merging so we can fire
        // notifications on the transition (web parity for the menu-bar app's
        // ready/waiting/pressure alerts).
        var prevSnap = { state: a.state, metrics: a.metrics ? { pressure_level: a.metrics.pressure_level } : null };
        var role = a.role, wn = a.worker_name, wid = a.worker_id, ch = a.children;
        Object.assign(a, s);
        if (role && !a.role) a.role = role;
        if (wn && !a.worker_name) a.worker_name = wn;
        if (wid && !a.worker_id) a.worker_id = wid;
        a.children = ch;
        maybeNotifyOnUpdate(prevSnap, a);
        return;
      }
      // First sight of this session — treat any non-trivial state as a
      // transition for notification purposes.
      maybeNotifyOnUpdate(null, s);
      var groupName = s.project_name || 'unknown';
      var group = dashboardGroups.find(g => g.name === groupName);
      if (!group) {
        group = {name: groupName, agents: []};
        dashboardGroups.push(group);
      }
      if (s.parent_session_id) {
        var parentEntry = sessionIndex.get(s.parent_session_id);
        if (parentEntry) {
          if (!parentEntry.agent.children) parentEntry.agent.children = [];
          parentEntry.agent.children.push(s);
          sessionIndex.set(s.session_id, {group: parentEntry.group, agent: s, parent: parentEntry.agent});
          return;
        }
      }
      group.agents.push(s);
      sessionIndex.set(s.session_id, {group: group, agent: s, parent: null});
    }

    function applySessionDelete(sessionId) {
      var entry = sessionIndex.get(sessionId);
      delete lastTickGen[sessionId];
      delete historyByGranularity[1][sessionId];
      delete historyByGranularity[10][sessionId];
      delete historyByGranularity[60][sessionId];
      // Plug the slow leak — without this, the notify-dedupe map keeps
      // entries for deleted sessions indefinitely.
      lastNotifiedPressure.delete(sessionId);
      if (!entry) return;
      sessionIndex.delete(sessionId);
      if (entry.parent) {
        var ci = entry.parent.children.findIndex(c => c.session_id === sessionId);
        if (ci >= 0) entry.parent.children.splice(ci, 1);
      } else {
        var ai = entry.group.agents.findIndex(a => a.session_id === sessionId);
        if (ai >= 0) entry.group.agents.splice(ai, 1);
      }
      if (entry.group.agents.length === 0) {
        var gi = dashboardGroups.indexOf(entry.group);
        if (gi >= 0) dashboardGroups.splice(gi, 1);
      }
    }

    // --- Orchestrator rendering (innerHTML is fine — updates rarely) ---
    // toolLabel maps raw tool names to short display strings for session rows.
    const toolLabel = {
      Bash: 'Bash', Read: 'Read', Write: 'Write', Edit: 'Edit',
      Glob: 'Glob', Grep: 'Grep', Agent: 'Agent',
      AskUserQuestion: 'Ask User', ExitPlanMode: 'Plan Mode',
      WebSearch: 'Search', WebFetch: 'Fetch', TodoWrite: 'Todo',
    };

    function stateColor(s) {
      if (s === 'working') return 'var(--working)';
      if (s === 'waiting') return 'var(--waiting)';
      if (s === 'ready') return 'var(--ready)';
      return 'var(--muted)';
    }

    function dotBar(total, done) {
      const maxDots = 7;
      // Coerce inputs to integers and bound the final dot counts by maxDots
      // (a literal) so repeat() is provably bounded regardless of WS payload.
      // Behaviour for legitimate inputs is unchanged at any scale: the
      // done/total ratio still drives filled-vs-empty.
      const t = Number(total) | 0;
      const d = Number(done) | 0;
      const totalDots = Math.max(0, Math.min(t, maxDots));
      if (totalDots <= 0) return '';
      const filled = t <= maxDots ? d : Math.round(d / t * maxDots);
      const filledDots = Math.max(0, Math.min(filled, totalDots, maxDots));
      const emptyDots = Math.max(0, Math.min(totalDots - filledDots, maxDots));
      return '\u25CF'.repeat(filledDots) + '\u25CB'.repeat(emptyDots);
    }

    function renderOrchestrator() {
      const container = document.getElementById('gt-container');
      const hasOrch = orchestrator && orchestrator.running;
      const hasFull = orchFull && orchFull.running;

      if (hasFull && orchFull.global_agents && orchFull.global_agents.length) {

          html += '<div class="gt-agent-chip" title="' + esc(ga.description || ga.role) + '">';
          html += '<span>' + (ga.icon ? esc(ga.icon) + ' ' : '') + esc(ga.role) + '</span>';

            html += '</span>';
            html += '<span class="gt-chip-dot" style="background:' + stateColor(w.state) + '"></span>';

      const convoys = workUnits.filter(w => w.type === 'convoy');

        html += '<div class="gt-body">';
