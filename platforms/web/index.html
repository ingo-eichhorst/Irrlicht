<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Irrlicht</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080c16;
      --bg-glow: #0d1424;
      --surface: #0f1628;
      --surface-hover: #141d34;
      --border: #1a2340;
      --border-subtle: #141c32;
      --text: #d4daf0;
      --text-bright: #edf0fa;
      --muted: #5a6480;
      --working: #8B5CF6;
      --working-dim: rgba(139, 92, 246, 0.12);
      --working-glow: rgba(139, 92, 246, 0.25);
      --waiting: #FF9500;
      --waiting-dim: rgba(255, 149, 0, 0.12);
      --waiting-glow: rgba(255, 149, 0, 0.2);
      --ready: #34C759;
      --ready-dim: rgba(52, 199, 89, 0.12);
      --ready-glow: rgba(52, 199, 89, 0.2);
      --cancelled: #8E8E93;
      --cancelled-dim: rgba(142, 142, 147, 0.1);
      --pressure-low: #34C759;
      --pressure-medium: #FF9500;
      --pressure-high: #FF3B30;
      --pressure-critical: #D70015;
      --ws-connected: #34C759;
      --ws-disconnected: #FF3B30;
      --font-mono: ui-monospace, "SF Mono", "Cascadia Code", "Fira Mono", Menlo, Consolas, monospace;
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    }

    body {
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 80% 60% at 50% 40%, var(--bg-glow) 0%, var(--bg) 100%);
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 14px;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* Noise texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      opacity: 0.035;
      pointer-events: none;
      z-index: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 256px 256px;
    }

    /* Faint grid pattern */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      opacity: 0.03;
      pointer-events: none;
      z-index: 0;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 59px, rgba(100, 140, 255, 0.3) 59px, rgba(100, 140, 255, 0.3) 60px),
        repeating-linear-gradient(90deg, transparent, transparent 59px, rgba(100, 140, 255, 0.3) 59px, rgba(100, 140, 255, 0.3) 60px);
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 28px;
      border-bottom: 1px solid var(--border-subtle);
      background: rgba(8, 12, 22, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .header-left { display: flex; align-items: baseline; gap: 16px; }

    .logo {
      font-family: var(--font-mono);
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--text-bright);
    }

    .logo span { color: var(--working); }

    .summary {
      display: flex;
      align-items: center;
      gap: 14px;
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 0.04em;
    }

    .summary-item {
      display: flex;
      align-items: center;
      gap: 5px;
      color: var(--muted);
    }

    .summary-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .summary-count {
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: var(--text);
    }

    .ws-status {
      display: flex;
      align-items: center;
      gap: 7px;
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.03em;
      color: var(--muted);
    }

    .ws-ring {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 2px solid var(--ws-disconnected);
      transition: border-color 0.4s, background 0.4s;
    }

    .ws-ring.connected {
      border-color: var(--ws-connected);
      background: rgba(52, 199, 89, 0.3);
    }

    .ws-ring.connecting {
      border-color: var(--waiting);
      animation: ws-pulse 1.2s ease-in-out infinite;
    }

    @keyframes ws-pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.85); }
    }

    main {
      position: relative;
      z-index: 1;
      padding: 28px;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* Empty state */
    #empty-state {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 100px 24px;
      color: var(--muted);
    }

    .empty-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--muted);
      opacity: 0.4;
      animation: empty-breathe 3s ease-in-out infinite;
      margin-bottom: 20px;
    }

    @keyframes empty-breathe {
      0%, 100% { opacity: 0.15; transform: scale(0.9); }
      50% { opacity: 0.5; transform: scale(1.1); }
    }

    #empty-state p {
      font-family: var(--font-mono);
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    /* Session grid */
    .session-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 16px;
    }

    /* Session group (parent + subagents) */
    .session-group { display: contents; }

    /* Card base */
    .session-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px;
      border-left: 3px solid var(--border);
      transition: transform 0.2s ease, border-color 0.3s, box-shadow 0.3s;
      opacity: 0;
      animation: card-reveal 0.4s ease forwards;
    }

    .session-card:hover {
      transform: translateY(-2px);
      background: var(--surface-hover);
    }

    @keyframes card-reveal {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* State-specific card styles */
    .session-card[data-state="working"] {
      border-left-color: var(--working);
      box-shadow: inset 3px 0 0 var(--working), 0 0 24px var(--working-dim);
      animation: card-reveal 0.4s ease forwards, card-breathe 4s ease-in-out infinite 0.4s;
    }

    @keyframes card-breathe {
      0%, 100% { box-shadow: inset 3px 0 0 var(--working), 0 0 20px var(--working-dim); }
      50% { box-shadow: inset 3px 0 0 var(--working), 0 0 32px var(--working-glow); }
    }

    .session-card[data-state="waiting"] {
      border-left-color: var(--waiting);
      box-shadow: inset 3px 0 0 var(--waiting), 0 0 16px var(--waiting-dim);
    }

    .session-card[data-state="ready"] {
      border-left-color: var(--ready);
      box-shadow: inset 3px 0 0 var(--ready), 0 0 16px var(--ready-dim);
    }


    /* Subagent card */
    .subagent-card {
      background: rgba(15, 22, 40, 0.6);
      border: 1px solid var(--border-subtle);
      border-radius: 8px;
      padding: 10px 14px;
      margin-left: 20px;
      margin-top: -8px;
      border-left: 2px solid var(--border);
      opacity: 0;
      animation: card-reveal 0.4s ease forwards;
    }

    .subagent-card[data-state="working"] { border-left-color: var(--working); }
    .subagent-card[data-state="waiting"]  { border-left-color: var(--waiting); }
    .subagent-card[data-state="ready"]    { border-left-color: var(--ready); }

    .subagent-label {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .subagent-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
    }

    .subagent-row .row-value { font-size: 12px; }

    /* Card header */
    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 10px;
    }

    .state-indicator {
      display: flex;
      align-items: center;
      gap: 7px;
      flex-shrink: 0;
    }

    .state-svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    .state-svg.working { animation: spin 2.5s linear infinite; }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .state-label {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .state-label.working  { color: var(--working); }
    .state-label.waiting  { color: var(--waiting); }
    .state-label.ready    { color: var(--ready); }

    .adapter-badge {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      white-space: nowrap;
      background: rgba(255,255,255,0.04);
      color: var(--muted);
    }

    .adapter-badge.claude  { color: #a78bfa; background: rgba(167,139,250,0.1); }
    .adapter-badge.copilot { color: #60a5fa; background: rgba(96,165,250,0.1); }
    .adapter-badge.cursor  { color: #34d399; background: rgba(52,211,153,0.1); }
    .adapter-badge.aider   { color: #fbbf24; background: rgba(251,191,36,0.1); }
    .adapter-badge.role    { color: #f97316; background: rgba(249,115,22,0.1); }

    /* Card body rows */
    .card-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
      font-size: 13px;
      min-width: 0;
    }

    .card-row:last-child { margin-bottom: 0; }

    .row-icon {
      flex-shrink: 0;
      width: 16px;
      text-align: center;
      color: var(--muted);
    }

    .row-icon svg {
      width: 14px;
      height: 14px;
      vertical-align: middle;
    }

    .row-value {
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
      font-variant-numeric: tabular-nums;
    }

    .row-value.muted { color: var(--muted); }
    .row-value.mono { font-family: var(--font-mono); font-size: 12px; }

    /* Context bar */
    .context-bar-wrap {
      height: 4px;
      background: rgba(255,255,255,0.06);
      border-radius: 2px;
      overflow: hidden;
      flex: 1;
      min-width: 60px;
    }

    .context-bar {
      height: 100%;
      border-radius: 2px;
      background: var(--pressure-low);
      transition: width 0.5s ease, background 0.4s;
    }

    .context-bar.medium  { background: var(--pressure-medium); }
    .context-bar.high    { background: var(--pressure-high); }
    .context-bar.critical { background: var(--pressure-critical); }

    .context-pct {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
      flex-shrink: 0;
      width: 36px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    /* Pressure alert */
    .pressure-alert {
      margin-top: 8px;
      padding: 5px 10px;
      border-radius: 5px;
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.04em;
    }

    .pressure-alert.high {
      background: rgba(255, 59, 48, 0.1);
      color: var(--pressure-high);
      border: 1px solid rgba(255, 59, 48, 0.2);
    }

    .pressure-alert.critical {
      background: rgba(215, 0, 21, 0.12);
      color: var(--pressure-critical);
      border: 1px solid rgba(215, 0, 21, 0.25);
    }

    /* Card footer */
    .card-footer {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid var(--border-subtle);
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      font-variant-numeric: tabular-nums;
    }

    /* Gas Town section */
    .gt-section {
      margin-bottom: 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .gt-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border-subtle);
    }

    .gt-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-mono);
      font-size: 14px;
      font-weight: 700;
      color: var(--text-bright);
      letter-spacing: 0.04em;
    }

    .gt-title .gt-emoji { font-size: 16px; }
    .gt-title .gt-count {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
    }

    .gt-status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      display: inline-block;
    }

    .gt-status-label {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .gt-body { padding: 0; }

    /* Global agent row */
    .gt-agent-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 18px;
      border-bottom: 1px solid var(--border-subtle);
      transition: background 0.15s;
    }

    .gt-agent-row:last-child { border-bottom: none; }
    .gt-agent-row:hover { background: var(--surface-hover); }

    .gt-agent-emoji { font-size: 14px; flex-shrink: 0; }

    .gt-agent-role {
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--text);
      flex: 1;
    }

    .gt-agent-state {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* Convoy section */
    .gt-convoy-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 18px;
      border-bottom: 1px solid var(--border-subtle);
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .gt-convoy-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 18px 7px 32px;
      border-bottom: 1px solid var(--border-subtle);
      font-family: var(--font-mono);
      font-size: 12px;
    }

    .gt-convoy-row:last-child { border-bottom: none; }

    .gt-convoy-name {
      color: var(--text);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .gt-convoy-name.done { color: var(--muted); }

    .gt-dotbar {
      letter-spacing: 2px;
      font-size: 11px;
      flex-shrink: 0;
    }

    .gt-convoy-fraction {
      font-size: 11px;
      color: var(--muted);
      flex-shrink: 0;
      min-width: 40px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .gt-convoy-check {
      color: var(--ready);
      font-size: 11px;
      flex-shrink: 0;
    }

    /* Codebase (rig) section */
    .gt-codebase-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      border-bottom: 1px solid var(--border-subtle);
      cursor: pointer;
      transition: background 0.15s;
    }

    .gt-codebase-header:hover { background: var(--surface-hover); }

    .gt-rig-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .gt-rig-name {
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      flex: 1;
    }

    .gt-rig-count {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
    }

    .gt-rig-agents { padding-left: 14px; }

    .gt-rig-agent-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 18px 6px 32px;
      border-bottom: 1px solid var(--border-subtle);
      font-size: 12px;
      transition: background 0.15s;
    }

    .gt-rig-agent-row:last-child { border-bottom: none; }
    .gt-rig-agent-row:hover { background: var(--surface-hover); }

    .gt-rig-agent-emoji { font-size: 12px; flex-shrink: 0; }

    .gt-rig-agent-name {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text);
      flex: 1;
    }

    .gt-bead-id {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--working);
    }

    .gt-rig-agent-state {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .gt-section-label {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 10px 0 8px 0;
    }
    .group-header {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .group-header .gt-rig-count {
      color: var(--muted);
      font-weight: 400;
    }

    /* Responsive */
    @media (max-width: 768px) {
      header { padding: 16px 20px; }
      main { padding: 20px; }
      .session-grid { grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; }
      .summary { gap: 10px; }
    }

    @media (max-width: 480px) {
      header { flex-direction: column; align-items: flex-start; gap: 10px; }
      main { padding: 16px; }
      .session-grid { grid-template-columns: 1fr; }
      .subagent-card { margin-left: 12px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-left">
      <div class="logo">irr<span>licht</span></div>
      <div class="summary" id="summary" aria-label="Session summary">
        <div class="summary-item">
          <div class="summary-dot" style="background:var(--working)"></div>
          <span class="summary-count" id="cnt-working">0</span>
        </div>
        <div class="summary-item">
          <div class="summary-dot" style="background:var(--waiting)"></div>
          <span class="summary-count" id="cnt-waiting">0</span>
        </div>
        <div class="summary-item">
          <div class="summary-dot" style="background:var(--ready)"></div>
          <span class="summary-count" id="cnt-ready">0</span>
        </div>
      </div>
    </div>
    <div class="ws-status" role="status" aria-live="polite">
      <div class="ws-ring connecting" id="ws-ring"></div>
      <span id="ws-label">connecting</span>
    </div>
  </header>

  <main>
    <div id="gt-container" style="display:none" aria-label="Gas Town"></div>
    <div id="empty-state">
      <div class="empty-dot"></div>
      <p>awaiting sessions</p>
    </div>
    <div class="session-grid" id="session-grid" aria-live="polite"></div>
  </main>

  <script>
    // Hierarchical dashboard state: Orchestrator -> Groups -> Agents -> Children.
    let dashboardGroups = [];   // AgentGroup[] from API
    let orchestrator = null;    // OrchestratorSummary from API
    let sessionIndex = new Map(); // session_id -> {group, agent} for fast WS updates

    // --- SVG Icons ---
    const svgIcons = {
      working: '<svg class="state-svg working" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6.5" stroke="#8B5CF6" stroke-width="1.5" stroke-dasharray="4 3"/></svg>',
      waiting: '<svg class="state-svg" viewBox="0 0 16 16" fill="none"><rect x="4" y="3" width="2.5" height="10" rx="1" fill="#FF9500"/><rect x="9.5" y="3" width="2.5" height="10" rx="1" fill="#FF9500"/></svg>',
      ready: '<svg class="state-svg" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6.5" stroke="#34C759" stroke-width="1.5"/><path d="M5 8.2l2 2 4-4.4" stroke="#34C759" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>',
      cancelled: '<svg class="state-svg" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6.5" stroke="#8E8E93" stroke-width="1.5"/><path d="M5.5 5.5l5 5M10.5 5.5l-5 5" stroke="#8E8E93" stroke-width="1.5" stroke-linecap="round"/></svg>',
      folder: '<svg viewBox="0 0 14 14" fill="none"><path d="M2 3.5A1.5 1.5 0 013.5 2h2.38a1 1 0 01.72.3L7.7 3.5h3.8A1.5 1.5 0 0113 5v5.5a1.5 1.5 0 01-1.5 1.5h-8A1.5 1.5 0 012 10.5V3.5z" stroke="currentColor" stroke-width="1.2"/></svg>',
      model: '<svg viewBox="0 0 14 14" fill="none"><rect x="2" y="4" width="10" height="7" rx="1.5" stroke="currentColor" stroke-width="1.2"/><path d="M5 4V2.5a1 1 0 012 0V4M9 7h0" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>',
      branch: '<svg viewBox="0 0 14 14" fill="none"><circle cx="5" cy="3.5" r="1.5" stroke="currentColor" stroke-width="1.1"/><circle cx="9" cy="3.5" r="1.5" stroke="currentColor" stroke-width="1.1"/><circle cx="5" cy="10.5" r="1.5" stroke="currentColor" stroke-width="1.1"/><path d="M5 5v4M9 5c0 2-4 2-4 4" stroke="currentColor" stroke-width="1.1"/></svg>',
      token: '<svg viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.2"/><path d="M7 4.5v5M5.5 6h3" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/></svg>',
      clock: '<svg viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.2"/><path d="M7 4.5V7l2 1.5" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/></svg>',
      chart: '<svg viewBox="0 0 14 14" fill="none"><rect x="2" y="8" width="2" height="4" rx="0.5" fill="currentColor" opacity="0.4"/><rect x="6" y="5" width="2" height="7" rx="0.5" fill="currentColor" opacity="0.6"/><rect x="10" y="2" width="2" height="10" rx="0.5" fill="currentColor" opacity="0.8"/></svg>',
    };

    function stateIcon(state) {
      return svgIcons[state] || svgIcons.ready;
    }

    function adapterLabel(adapter) {
      if (!adapter || adapter === '') return 'claude';
      return adapter.toLowerCase();
    }

    function formatTokens(n) {
      if (!n) return '';
      if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
      if (n >= 1000) return (n / 1000).toFixed(1) + 'k';
      return String(n);
    }

    function formatModel(m) {
      if (!m || m === 'unknown') return '';
      return m;
    }

    function formatElapsed(firstSeen, elapsedStored, isActive) {
      if (isActive && firstSeen) {
        const secs = Math.max(0, Math.floor(Date.now() / 1000 - firstSeen));
        return fmtDuration(secs);
      }
      if (elapsedStored && elapsedStored > 0) return fmtDuration(elapsedStored);
      return '';
    }

    function fmtDuration(secs) {
      const h = Math.floor(secs / 3600);
      const m = Math.floor((secs % 3600) / 60);
      const s = secs % 60;
      if (h > 0) return h + 'h ' + m + 'm';
      if (m > 0) return m + 'm ' + s + 's';
      return s + 's';
    }

    function formatAge(ts) {
      if (!ts) return '';
      const secs = Math.floor(Date.now() / 1000 - ts);
      if (secs < 60) return secs + 's ago';
      if (secs < 3600) return Math.floor(secs / 60) + 'm ago';
      return Math.floor(secs / 3600) + 'h ago';
    }

    function shortID(id) {
      return id ? id.slice(0, 8) : '';
    }

    function pressureClass(level) {
      if (level === 'critical') return 'critical';
      if (level === 'high') return 'high';
      if (level === 'medium') return 'medium';
      return '';
    }

    function esc(s) {
      if (s == null) return '';
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // --- Session index helpers ---
    function rebuildIndex() {
      sessionIndex.clear();
      for (var g of dashboardGroups) {
        for (var a of g.agents) {
          sessionIndex.set(a.session_id, {group: g, agent: a, parent: null});
          indexChildren(g, a);
        }
      }
    }
    function indexChildren(group, parent) {
      if (!parent.children) return;
      for (var c of parent.children) {
        sessionIndex.set(c.session_id, {group: group, agent: c, parent: parent});
        indexChildren(group, c);
      }
    }

    // Apply a session update/create from WS.
    function applySessionUpdate(s) {
      var entry = sessionIndex.get(s.session_id);
      if (entry) {
        // Update in-place, preserving role and children.
        var a = entry.agent;
        var role = a.role, wn = a.worker_name, wid = a.worker_id, ch = a.children;
        Object.assign(a, s);
        if (role && !a.role) a.role = role;
        if (wn && !a.worker_name) a.worker_name = wn;
        if (wid && !a.worker_id) a.worker_id = wid;
        a.children = ch;
        return;
      }
      // New session — find or create group by project_name.
      var groupName = s.project_name || 'unknown';
      var group = dashboardGroups.find(g => g.name === groupName);
      if (!group) {
        group = {name: groupName, agents: []};
        dashboardGroups.push(group);
      }
      if (s.parent_session_id) {
        // Try to attach as child of parent agent.
        var parentEntry = sessionIndex.get(s.parent_session_id);
        if (parentEntry) {
          if (!parentEntry.agent.children) parentEntry.agent.children = [];
          parentEntry.agent.children.push(s);
          sessionIndex.set(s.session_id, {group: parentEntry.group, agent: s, parent: parentEntry.agent});
          return;
        }
      }
      group.agents.push(s);
      sessionIndex.set(s.session_id, {group: group, agent: s, parent: null});
    }

    // Remove a session from WS delete.
    function applySessionDelete(sessionId) {
      var entry = sessionIndex.get(sessionId);
      if (!entry) return;
      sessionIndex.delete(sessionId);
      if (entry.parent) {
        var ci = entry.parent.children.findIndex(c => c.session_id === sessionId);
        if (ci >= 0) entry.parent.children.splice(ci, 1);
      } else {
        var ai = entry.group.agents.findIndex(a => a.session_id === sessionId);
        if (ai >= 0) entry.group.agents.splice(ai, 1);
      }
      // Remove empty groups.
      if (entry.group.agents.length === 0) {
        var gi = dashboardGroups.indexOf(entry.group);
        if (gi >= 0) dashboardGroups.splice(gi, 1);
      }
    }

    // --- Render ---
    const roleEmoji = { mayor: '\u{1F3A9}', deacon: '\u{1F4CB}', witness: '\u{1F989}', refinery: '\u{1F3ED}', polecat: '\u{1F477}', crew: '\u{1F9D1}\u200D\u{1F4BB}' };

    function renderCard(s, idx) {
      const state = s.state || 'ready';
      const adapter = adapterLabel(s.adapter);
      const metrics = s.metrics || {};
      const model = metrics.model_name || s.model || '';
      const tokens = metrics.total_tokens || 0;
      const ctxPct = metrics.context_utilization_percentage || 0;
      const pressure = metrics.pressure_level || '';
      const branch = s.git_branch || '';
      const project = s.project_name || '';
      const isActive = state === 'working' || state === 'waiting';
      const elapsed = formatElapsed(s.first_seen, metrics.elapsed_seconds, isActive);
      const ctxBarClass = pressureClass(pressure);
      const ctxWidth = Math.min(100, ctxPct).toFixed(1);
      const delay = Math.min(idx * 60, 400);

      let pressureAlert = '';
      if (isActive && (pressure === 'high' || pressure === 'critical')) {
        const cls = pressure === 'critical' ? 'critical' : 'high';
        pressureAlert = '<div class="pressure-alert ' + cls + '">Context pressure: ' + esc(pressure) + '</div>';
      }

      return '<div class="session-card" data-state="' + esc(state) + '" data-id="' + esc(s.session_id) + '" style="animation-delay:' + delay + 'ms">' +
        '<div class="card-header">' +
          '<div class="state-indicator">' +
            stateIcon(state) +
            '<span class="state-label ' + esc(state) + '">' + esc(state.replace('_', ' ')) + '</span>' +
          '</div>' +
          (s.role ? '<span class="adapter-badge role">' + (roleEmoji[s.role] || '') + ' ' + esc(s.worker_name || s.role) + '</span>' : '<span class="adapter-badge ' + esc(adapter) + '">' + esc(adapter) + '</span>') +
        '</div>' +
        (project ? '<div class="card-row"><span class="row-icon">' + svgIcons.folder + '</span><span class="row-value">' + esc(project) + '</span></div>' : '') +
        '<div class="card-row"><span class="row-icon">' + svgIcons.model + '</span><span class="row-value ' + (model ? 'mono' : 'muted') + '">' + esc(model || '\u2014') + '</span></div>' +
        (branch ? '<div class="card-row"><span class="row-icon">' + svgIcons.branch + '</span><span class="row-value mono">' + esc(branch) + '</span></div>' : '') +
        (elapsed ? '<div class="card-row"><span class="row-icon">' + svgIcons.clock + '</span><span class="row-value mono elapsed" data-first-seen="' + (isActive ? (s.first_seen || '') : '') + '" data-elapsed-stored="' + (metrics.elapsed_seconds || '') + '" data-active="' + (isActive ? '1' : '0') + '">' + esc(elapsed) + '</span></div>' : '') +
        (tokens > 0 ? '<div class="card-row"><span class="row-icon">' + svgIcons.token + '</span><span class="row-value mono">' + esc(formatTokens(tokens)) + '</span></div>' : '') +
        (ctxPct > 0 ? '<div class="card-row"><span class="row-icon">' + svgIcons.chart + '</span><div class="context-bar-wrap"><div class="context-bar ' + esc(ctxBarClass) + '" style="width:' + ctxWidth + '%"></div></div><span class="context-pct">' + ctxPct.toFixed(0) + '%</span></div>' : '') +
        pressureAlert +
        '<div class="card-footer">' +
          '<span>' + esc(shortID(s.session_id)) + '</span>' +
          '<span class="age-label" data-updated="' + (s.updated_at || '') + '">' + formatAge(s.updated_at) + '</span>' +
        '</div>' +
      '</div>';
    }

    function renderSubagentCard(s, idx) {
      const state = s.state || 'ready';
      const metrics = s.metrics || {};
      const model = metrics.model_name || s.model || '';
      const ctxPct = metrics.context_utilization_percentage || 0;
      const pressure = metrics.pressure_level || '';
      const isActive = state === 'working' || state === 'waiting';
      const elapsed = formatElapsed(s.first_seen, metrics.elapsed_seconds, isActive);
      const delay = Math.min(idx * 60 + 100, 500);

      return '<div class="subagent-card" data-state="' + esc(state) + '" data-id="' + esc(s.session_id) + '" style="animation-delay:' + delay + 'ms">' +
        '<div class="subagent-label">subagent</div>' +
        '<div class="subagent-row">' +
          stateIcon(state) +
          '<span class="row-value mono">' + esc(model || '\u2014') + '</span>' +
          (elapsed ? '<span class="row-value mono elapsed" data-first-seen="' + (isActive ? (s.first_seen || '') : '') + '" data-elapsed-stored="' + (metrics.elapsed_seconds || '') + '" data-active="' + (isActive ? '1' : '0') + '" style="flex:0;white-space:nowrap">' + esc(elapsed) + '</span>' : '') +
          (ctxPct > 0 ? '<span class="context-pct">' + ctxPct.toFixed(0) + '%</span>' : '') +
        '</div>' +
      '</div>';
    }

    // --- Orchestrator structural rendering ---
    function dotBar(total, done) {
      const maxDots = 7;
      const totalDots = Math.min(total, maxDots);
      if (totalDots <= 0) return '';
      const filled = total <= maxDots ? done : Math.round(done / total * maxDots);
      return '\u25CF'.repeat(Math.min(filled, totalDots)) + '\u25CB'.repeat(Math.max(totalDots - filled, 0));
    }

    function renderOrchestrator() {
      const container = document.getElementById('gt-container');
      if (!orchestrator || !orchestrator.running) {
        container.style.display = 'none';
        return;
      }
      container.style.display = 'block';
      const workUnits = orchestrator.work_units || [];
      const convoys = workUnits.filter(w => w.type === 'convoy');

      let html = '<div class="gt-section">';
      html += '<div class="gt-header">';
      html += '<div class="gt-title"><span class="gt-emoji">\u26FD</span> Gas Town</div>';
      html += '<div class="gt-status-label"><div class="gt-status-dot" style="background:var(--ready)"></div>running</div>';
      html += '</div>';

      if (convoys.length > 0) {
        html += '<div class="gt-body">';
        html += '<div class="gt-convoy-header">\u{1F69A} Convoys</div>';
        for (const c of convoys) {
          const isDone = c.done >= c.total;
          html += '<div class="gt-convoy-row">';
          html += '<span class="gt-convoy-name' + (isDone ? ' done' : '') + '">' + esc(c.name) + '</span>';
          html += '<span class="gt-dotbar" style="color:' + (isDone ? 'var(--ready)' : 'var(--working)') + '">' + dotBar(c.total, c.done) + '</span>';
          html += '<span class="gt-convoy-fraction">' + c.done + ' / ' + c.total + '</span>';
          if (isDone) html += '<span class="gt-convoy-check">\u2713</span>';
          html += '</div>';
        }
        html += '</div>';
      }

      html += '</div>';
      container.innerHTML = html;
    }

    function renderGroupHeader(group) {
      const statusDot = group.status ? '<div class="gt-rig-dot" style="background:' +
        (group.status === 'operational' ? 'var(--ready)' : 'var(--pressure-high)') + '"></div>' : '';
      return '<div class="gt-section-label group-header">' + statusDot +
        '<span>' + esc(group.name) + '</span>' +
        '<span class="gt-rig-count">' + group.agents.length + ' agent' + (group.agents.length === 1 ? '' : 's') + '</span>' +
        '</div>';
    }

    function render() {
      renderOrchestrator();
      const grid = document.getElementById('session-grid');
      const empty = document.getElementById('empty-state');

      // Sort agents within each group: working > waiting > ready, then by updated_at desc.
      const stateOrder = ['working', 'waiting', 'ready'];
      function agentSort(a, b) {
        const ai = stateOrder.indexOf(a.state);
        const bi = stateOrder.indexOf(b.state);
        if (ai !== bi) return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
        return (b.updated_at || 0) - (a.updated_at || 0);
      }

      // Sort groups by most active agent state, then by name.
      function groupPriority(g) {
        let best = 99;
        for (const a of g.agents) {
          const i = stateOrder.indexOf(a.state);
          if (i >= 0 && i < best) best = i;
        }
        return best;
      }
      dashboardGroups.sort((a, b) => {
        const pa = groupPriority(a), pb = groupPriority(b);
        if (pa !== pb) return pa - pb;
        return a.name.localeCompare(b.name);
      });

      if (dashboardGroups.length === 0) {
        empty.style.display = 'flex';
        grid.innerHTML = '';
      } else {
        empty.style.display = 'none';
        let html = '';
        let idx = 0;
        const showHeaders = dashboardGroups.length > 1;
        for (const g of dashboardGroups) {
          if (showHeaders) html += renderGroupHeader(g);
          g.agents.sort(agentSort);
          for (const a of g.agents) {
            html += renderCard(a, idx++);
            for (const sub of (a.children || [])) {
              html += renderSubagentCard(sub, idx++);
            }
          }
        }
        grid.innerHTML = html;
      }
      // Build flat list for summary counts.
      const all = [];
      function collectAll(agents) {
        for (const a of agents) {
          all.push(a);
          if (a.children) collectAll(a.children);
        }
      }
      for (const g of dashboardGroups) collectAll(g.agents);
      updateSummary(all);
    }

    function updateSummary(list) {
      let w = 0, wa = 0, r = 0;
      for (const s of list) {
        if (s.state === 'working') w++;
        else if (s.state === 'waiting') wa++;
        else if (s.state === 'ready') r++;
      }
      document.getElementById('cnt-working').textContent = w;
      document.getElementById('cnt-waiting').textContent = wa;
      document.getElementById('cnt-ready').textContent = r;
    }

    // --- Selective elapsed time tick (1s) ---
    function tickElapsed() {
      const els = document.querySelectorAll('.elapsed');
      const now = Date.now() / 1000;
      for (const el of els) {
        const active = el.getAttribute('data-active') === '1';
        if (active) {
          const fs = parseFloat(el.getAttribute('data-first-seen'));
          if (fs) {
            el.textContent = fmtDuration(Math.max(0, Math.floor(now - fs)));
          }
        }
      }
      // Also update age labels
      const ages = document.querySelectorAll('.age-label');
      for (const el of ages) {
        const ts = parseFloat(el.getAttribute('data-updated'));
        if (ts) el.textContent = formatAge(ts);
      }
    }

    setInterval(tickElapsed, 1000);

    // --- Initial load ---
    fetch('/api/v1/sessions').then(r => r.json()).catch(() => ({})).then(resp => {
      dashboardGroups = resp.groups || [];
      orchestrator = resp.orchestrator || null;
      rebuildIndex();
      render();
    });

    // --- WebSocket with exponential backoff ---
    let ws = null;
    let reconnectDelay = 1000;

    function setWsStatus(status) {
      const ring = document.getElementById('ws-ring');
      const label = document.getElementById('ws-label');
      ring.className = 'ws-ring ' + status;
      label.textContent = status;
    }

    function connect() {
      setWsStatus('connecting');
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      ws = new WebSocket(proto + '://' + location.host + '/api/v1/sessions/stream');

      ws.onopen = function() {
        setWsStatus('connected');
        reconnectDelay = 1000;
      };

      ws.onmessage = function(evt) {
        var msg;
        try { msg = JSON.parse(evt.data); } catch(e) { return; }
        if (!msg) return;
        if (msg.type === 'orchestrator_state' && msg.orchestrator) {
          orchestrator = msg.orchestrator.running ? msg.orchestrator : null;
          render();
          return;
        }
        if (!msg.session) return;
        var s = msg.session;
        if (msg.type === 'session_deleted') {
          applySessionDelete(s.session_id);
        } else {
          applySessionUpdate(s);
        }
        render();
      };

      ws.onerror = function() {};

      ws.onclose = function() {
        setWsStatus('disconnected');
        setTimeout(connect, reconnectDelay);
        reconnectDelay = Math.min(reconnectDelay * 2, 30000);
      };
    }

    connect();
  </script>
</body>
</html>
