<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Irrlicht</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --text: #e0e4f0;
      --muted: #6b7280;
      --working: #f59e0b;
      --waiting: #3b82f6;
      --ready: #10b981;
      --cancelled: #6b7280;
      --ws-connected: #10b981;
      --ws-disconnected: #ef4444;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      font-size: 14px;
      min-height: 100vh;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
    }

    .logo {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text);
    }

    .logo span { color: var(--working); }

    .ws-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--muted);
    }

    .ws-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--ws-disconnected);
      transition: background 0.3s;
    }

    .ws-dot.connected { background: var(--ws-connected); }
    .ws-dot.connecting { background: var(--working); animation: pulse 1s ease-in-out infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    main {
      padding: 24px;
      max-width: 1400px;
      margin: 0 auto;
    }

    #empty-state {
      text-align: center;
      padding: 80px 24px;
      color: var(--muted);
    }

    #empty-state .icon { font-size: 48px; margin-bottom: 16px; }
    #empty-state p { font-size: 16px; }

    .session-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
    }

    .session-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      transition: border-color 0.2s, transform 0.1s;
      border-left: 3px solid var(--border);
    }

    .session-card[data-state="working"]  { border-left-color: var(--working); }
    .session-card[data-state="waiting"]  { border-left-color: var(--waiting); }
    .session-card[data-state="ready"]    { border-left-color: var(--ready); }
    .session-card[data-state="cancelled_by_user"] { border-left-color: var(--cancelled); opacity: 0.7; }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 12px;
    }

    .state-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .state-icon {
      font-size: 16px;
      line-height: 1;
    }

    .state-icon.working { animation: spin 2s linear infinite; display: inline-block; }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .state-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .state-label.working  { color: var(--working); }
    .state-label.waiting  { color: var(--waiting); }
    .state-label.ready    { color: var(--ready); }
    .state-label.cancelled_by_user { color: var(--cancelled); }

    .adapter-badge {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 4px;
      background: rgba(255,255,255,0.06);
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.3px;
      white-space: nowrap;
    }

    .adapter-badge.claude  { color: #a78bfa; background: rgba(167,139,250,0.12); }
    .adapter-badge.copilot { color: #60a5fa; background: rgba(96,165,250,0.12); }

    .session-id {
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 10px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .card-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 6px;
      font-size: 13px;
      min-width: 0;
    }

    .card-row:last-child { margin-bottom: 0; }

    .row-icon {
      font-size: 13px;
      flex-shrink: 0;
      width: 18px;
      text-align: center;
    }

    .row-value {
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }

    .row-value.muted { color: var(--muted); }

    .context-bar-wrap {
      height: 4px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
      overflow: hidden;
      flex: 1;
      min-width: 60px;
    }

    .context-bar {
      height: 100%;
      border-radius: 2px;
      background: var(--ready);
      transition: width 0.4s ease, background 0.3s;
    }

    .context-bar.medium { background: var(--working); }
    .context-bar.high   { background: #ef4444; }

    .context-pct {
      font-size: 11px;
      color: var(--muted);
      flex-shrink: 0;
      width: 36px;
      text-align: right;
    }

    .card-footer {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
    }

    @media (max-width: 480px) {
      main { padding: 16px; }
      .session-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">irr<span>licht</span></div>
    <div class="ws-status">
      <div class="ws-dot connecting" id="ws-dot"></div>
      <span id="ws-label">connecting</span>
    </div>
  </header>

  <main>
    <div id="empty-state" style="display:none">
      <div class="icon">📭</div>
      <p>No active sessions</p>
    </div>
    <div class="session-grid" id="session-grid"></div>
  </main>

  <script>
    const sessions = new Map();

    const stateIcons = {
      working: '⚙',
      waiting: '⏸',
      ready: '✓',
      cancelled_by_user: '✕',
    };

    function stateIcon(state) {
      return stateIcons[state] || '?';
    }

    function adapterLabel(adapter) {
      if (!adapter || adapter === '') return 'claude';
      return adapter.toLowerCase();
    }

    function formatTokens(n) {
      if (!n) return '—';
      if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
      if (n >= 1000) return (n / 1000).toFixed(1) + 'k';
      return String(n);
    }

    function formatModel(m) {
      if (!m || m === 'unknown') return '—';
      // Shorten common model names
      return m.replace('claude-', 'claude-').replace('-20', ' \'');
    }

    function formatBranch(b) {
      if (!b) return '—';
      return b;
    }

    function formatAge(ts) {
      if (!ts) return '';
      const secs = Math.floor(Date.now() / 1000 - ts);
      if (secs < 60) return `${secs}s ago`;
      if (secs < 3600) return `${Math.floor(secs / 60)}m ago`;
      return `${Math.floor(secs / 3600)}h ago`;
    }

    function shortID(id) {
      return id ? id.slice(0, 8) + '…' : '—';
    }

    function pressureClass(level) {
      if (level === 'high') return 'high';
      if (level === 'medium') return 'medium';
      return '';
    }

    function renderCard(s) {
      const state = s.state || 'ready';
      const adapter = adapterLabel(s.adapter);
      const metrics = s.metrics || {};
      const model = metrics.model_name || s.model || '';
      const tokens = metrics.total_tokens || 0;
      const ctxPct = metrics.context_utilization_percentage || 0;
      const pressure = metrics.pressure_level || '';
      const branch = s.git_branch || '';
      const project = s.project_name || '';
      const isWorking = state === 'working';

      const iconClass = isWorking ? ' working' : '';
      const ctxBarClass = pressureClass(pressure);
      const ctxWidth = Math.min(100, ctxPct).toFixed(1);

      return `
        <div class="session-card" data-state="${esc(state)}" data-id="${esc(s.session_id)}">
          <div class="card-header">
            <div class="state-indicator">
              <span class="state-icon${iconClass}">${stateIcon(state)}</span>
              <span class="state-label ${esc(state)}">${esc(state.replace('_', ' '))}</span>
            </div>
            <span class="adapter-badge ${esc(adapter)}">${esc(adapter)}</span>
          </div>
          <div class="session-id">${esc(shortID(s.session_id))}</div>
          ${project ? `
          <div class="card-row">
            <span class="row-icon">📁</span>
            <span class="row-value">${esc(project)}</span>
          </div>` : ''}
          <div class="card-row">
            <span class="row-icon">🤖</span>
            <span class="row-value ${model ? '' : 'muted'}">${esc(model ? formatModel(model) : '—')}</span>
          </div>
          <div class="card-row">
            <span class="row-icon">⎇</span>
            <span class="row-value ${branch ? '' : 'muted'}">${esc(formatBranch(branch))}</span>
          </div>
          ${tokens > 0 ? `
          <div class="card-row">
            <span class="row-icon">🪙</span>
            <span class="row-value">${esc(formatTokens(tokens))}</span>
          </div>` : ''}
          ${ctxPct > 0 ? `
          <div class="card-row">
            <span class="row-icon">📊</span>
            <div class="context-bar-wrap">
              <div class="context-bar ${esc(ctxBarClass)}" style="width:${ctxWidth}%"></div>
            </div>
            <span class="context-pct">${ctxPct.toFixed(0)}%</span>
          </div>` : ''}
          <div class="card-footer">
            <span>${esc(shortID(s.session_id))}</span>
            <span>${formatAge(s.updated_at)}</span>
          </div>
        </div>
      `.trim();
    }

    function esc(s) {
      if (s == null) return '';
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function render() {
      const grid = document.getElementById('session-grid');
      const empty = document.getElementById('empty-state');
      const active = [...sessions.values()].filter(s => s.state !== 'delete_session');

      // Sort: working first, then waiting, then ready, then others
      const order = ['working', 'waiting', 'ready', 'cancelled_by_user'];
      active.sort((a, b) => {
        const ai = order.indexOf(a.state);
        const bi = order.indexOf(b.state);
        if (ai !== bi) return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
        return (b.updated_at || 0) - (a.updated_at || 0);
      });

      if (active.length === 0) {
        empty.style.display = '';
        grid.innerHTML = '';
      } else {
        empty.style.display = 'none';
        grid.innerHTML = active.map(renderCard).join('');
      }
    }

    // Timestamps age continuously — refresh display every 30s
    setInterval(render, 30000);

    // Initial load
    fetch('/api/v1/sessions')
      .then(r => r.json())
      .then(list => {
        if (Array.isArray(list)) {
          list.forEach(s => sessions.set(s.session_id, s));
        }
        render();
      })
      .catch(err => console.error('initial load:', err));

    // WebSocket with exponential backoff reconnect
    let ws = null;
    let reconnectDelay = 1000;

    function setWsStatus(status) {
      const dot = document.getElementById('ws-dot');
      const label = document.getElementById('ws-label');
      dot.className = 'ws-dot ' + status;
      label.textContent = status;
    }

    function connect() {
      setWsStatus('connecting');
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      ws = new WebSocket(`${proto}://${location.host}/api/v1/sessions/stream`);

      ws.onopen = () => {
        setWsStatus('connected');
        reconnectDelay = 1000;
      };

      ws.onmessage = (evt) => {
        let msg;
        try { msg = JSON.parse(evt.data); } catch { return; }
        if (!msg || !msg.session) return;
        const s = msg.session;
        if (msg.type === 'session_deleted' || s.state === 'delete_session') {
          sessions.delete(s.session_id);
        } else {
          sessions.set(s.session_id, s);
        }
        render();
      };

      ws.onerror = () => {};

      ws.onclose = () => {
        setWsStatus('disconnected');
        setTimeout(connect, reconnectDelay);
        reconnectDelay = Math.min(reconnectDelay * 2, 30000);
      };
    }

    connect();
  </script>
</body>
</html>
