name: CodeScene Report (manual)

on:
  workflow_dispatch:
    inputs:
      action:
        description: "'report' (default) fetches an endpoint; 'trigger' kicks off a fresh full analysis of main and waits for it to complete"
        required: false
        default: "report"
        type: choice
        options:
          - report
          - trigger
      endpoint:
        description: "For action=report: API path under /v2/projects/<id>/ (default: analyses/latest). Ignored for action=trigger."
        required: false
        default: "analyses/latest"
      poll_timeout_secs:
        description: "For action=trigger: seconds to wait for the fresh analysis before falling back to the last completed one (default 900)"
        required: false
        default: "900"
      poll_interval_secs:
        description: "For action=trigger: seconds between polls (default 30)"
        required: false
        default: "30"

permissions:
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run CodeScene script
        env:
          CODESCENE_API_TOKEN: ${{ secrets.CODESCENE_API_TOKEN }}
          CODESCENE_PROJECT_ID: "82148"
          CODESCENE_POLL_TIMEOUT_SECS: ${{ inputs.poll_timeout_secs }}
          CODESCENE_POLL_INTERVAL_SECS: ${{ inputs.poll_interval_secs }}
          ACTION: ${{ inputs.action }}
          ENDPOINT: ${{ inputs.endpoint }}
        run: |
          if [[ "$ACTION" == "trigger" ]]; then
            tools/codescene-trigger.sh
          else
            tools/codescene-report.sh "$ENDPOINT"
          fi
