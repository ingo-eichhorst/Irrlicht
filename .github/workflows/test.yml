name: Tests

# Pass/fail gate for Go tests on every PR and on pushes to main. This is the
# enforcement the coverage workflow never provided: coverage.yml runs only on
# push-to-main, covers the `core` module alone, and swallows test failures
# (it parses coverage out of a discarded run). Without this, the module tests —
# including the onboarding-factory matrix/shard/validate suites — were verified
# locally only and could not block a PR.
#
# core, onboarding-factory, and starhistory are exercised. They share a
# go.work, so the runner resolves cross-module packages without per-module
# `go mod download`.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  go-test:
    # macOS gate — the platform developers build and run on, and where the
    # macOS-only paths (kqueue exit-watch, pgrep/lsof discovery, the menu-bar
    # app) actually execute. The Linux build+test gate lives in linux.yml
    # (#478 made core cross-platform via build-tagged process observation, so
    # it now compiles and tests on Linux too). coverage.yml runs on ubuntu but
    # silently swallows failures, so it is not a gate.
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      # Formatting gate (#629): plain gofmt over every Go tree so drift can't
      # re-accumulate. Runs before the test steps so unformatted code fails
      # fast and cheap. Prints the offending files in the failure message.
      - name: gofmt check
        run: |
          unformatted=$(gofmt -l core/ tools/)
          if [ -n "$unformatted" ]; then
            echo "$unformatted"
            # Workflow-command messages are single-line: collapse the file list
            # so the annotation shows the full fix command, not just file one.
            echo "::error::gofmt found unformatted files. Run: gofmt -w $(echo "$unformatted" | tr '\n' ' ')"
            exit 1
          fi

      # core carries the headless daemon smoke test + concurrency paths, so it
      # runs under -race (matches the documented local command in AGENTS.md).
      - name: Test core module
        run: go test ./core/... -race -count=1

      # tools/onboarding-factory holds the `of` factory CLI + the viewer +
      # replay/validate/matrix/shard packages (#510/#521).
      - name: Test onboarding-factory module
        run: go test ./tools/onboarding-factory/... -count=1

      # `of validate` is the factory's schema + referential-integrity gate over
      # replaydata/ (the catalog's 5-field scenarios, every cell metadata.json,
      # expected.jsonl presence, recording ownership). It is the single sanctioned
      # writer's read-back check, so a hand-edit that bypassed `of` fails here.
      - name: Validate replaydata (of validate)
        run: go run ./tools/onboarding-factory/cmd/of validate

      # tools/starhistory renders the README's star-history chart to a static
      # SVG (see .github/workflows/star-history.yml) — gates the cumulative
      # series + SVG rendering logic and the Link-header pagination parser.
      - name: Test starhistory module
        run: go test ./tools/starhistory/... -count=1

      # The recording-rig shell scripts aren't exercised by `go test` /
      # replay-fixtures (those replay static transcripts without driving), so
      # smoke-test is their only automated coverage: bash -n + the lib unit tests.
      - name: Smoke-test the recording rig
        run: bash tools/onboarding-factory/scripts/smoke-test.sh
