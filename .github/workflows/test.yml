name: Tests

# Pass/fail gate for Go tests on every PR and on pushes to main. This is the
# enforcement the coverage workflow never provided: coverage.yml runs only on
# push-to-main, covers the `core` module alone, and swallows test failures
# (it parses coverage out of a discarded run). Without this, module tests —
# including TestRollupInSync in tools/onboarding-factory — were verified
# locally only and could not block a PR.
#
# Both Go modules are exercised. They share a go.work, so the runner resolves
# cross-module packages without per-module `go mod download`.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  go-test:
    # macOS gate — the platform developers build and run on, and where the
    # macOS-only paths (kqueue exit-watch, pgrep/lsof discovery, the menu-bar
    # app) actually execute. The Linux build+test gate lives in linux.yml
    # (#478 made core cross-platform via build-tagged process observation, so
    # it now compiles and tests on Linux too). coverage.yml runs on ubuntu but
    # silently swallows failures, so it is not a gate.
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      # core carries the headless daemon smoke test + concurrency paths, so it
      # runs under -race (matches the documented local command in AGENTS.md).
      - name: Test core module
        run: go test ./core/... -race -count=1

      # tools/onboarding-factory holds the viewer + replay/validate/matrix/shard
      # packages and TestRollupInSync, which keeps the derived coverage rollup
      # in sync with the per-scenario shards (#510).
      - name: Test agent-onboarding module
        run: go test ./tools/onboarding-factory/... -count=1
