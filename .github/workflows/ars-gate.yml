name: ARS Architecture Gate

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ars-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: false

      - name: Run ARS architecture gate
        run: tools/ars-gate.sh core
