name: Replaydata deletion guard

# Protects load-bearing replaydata from accidental deletion. Rather than
# enumerate artifact filenames (which let new types like subagents/*.jsonl slip
# through), it protects WHOLE recording folders. A PR may FAIL only if its diff
# deletes one of:
#   - the consolidated catalog              replaydata/agents/scenarios.json   (the matrix catalog)
#   - ANY file under a regression recording   replaydata/agents/*/regressions/*/**
#     (regression cells aren't in the catalog, so even their assessment.json
#     is load-bearing — the viewer reads it on disk)
#   - ANY file (except assessment.json) under a scenarios/ recording whose folder
#     IS STILL A LIVE CELL at HEAD (it holds a metadata.json)
#   - any orchestrator scenario fixture   replaydata/orchestrators/*/scenarios/*  (#268)
#
# What is ALLOWED:
#   - deleting any scenarios/ recording whose folder holds NO metadata.json at
#     HEAD (an orphan / properly-retired cell — the metadata.json is the source
#     of truth, mirrored by internal/shard TestNoOrphanRecordingFolders and the
#     bash cell-integrity gate);
#   - deleting a scenarios/ cell's assessment.json (the assessment lives in the
#     cell's metadata.json details.assessment);
#   - renames (git mv, incl. the id-prefix folder rename) — never counted as
#     deletions.
#
# Background: #268 Phase 1 introduced a blanket scenarios/+regression guard; it
# was later made folder-granular + cell-aware so the pipeline can retire orphan
# recordings and drop scenarios/ assessment.json, while still protecting every
# other artifact of live cells and all of regression/.

on:
  pull_request:
    paths:
      - 'replaydata/**'
  workflow_dispatch:

jobs:
  guard:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout PR head with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Detect deletions of load-bearing replaydata
        run: |
          set -euo pipefail
          command -v jq >/dev/null || { sudo apt-get update -qq && sudo apt-get install -y -qq jq; }
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          echo "Comparing merge-base($base, $head) ...head $head"

          # Three-dot (base...head) diffs from the MERGE BASE to head — only what
          # this branch changed since it forked (avoids phantom deletions on
          # stale branches). --diff-filter=D = deletions; --find-renames=50% keeps
          # git mv as a rename (not a delete), documented + stable.
          deletions=$(git diff --name-only --diff-filter=D --find-renames=50% "$base...$head" -- 'replaydata/**' || true)

          # A scenarios/ recording folder is a LIVE cell iff it holds a
          # metadata.json at HEAD (the working tree == HEAD; we checked it out).
          # Deleting any artifact of a live cell is a violation; an orphan folder
          # (no metadata.json) is freely deletable.
          cell_is_live() {
            local a="$1" fold="$2"
            [ -f "replaydata/agents/$a/scenarios/$fold/metadata.json" ]
          }

          violations=""
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            # Protect WHOLE recording folders rather than enumerating artifact
            # filenames — so a new artifact type (e.g. subagents/*.jsonl) can't
            # silently slip through an outdated glob list. The ONLY allowed
            # deletion inside a recording folder is assessment.json (which the
            # scenarios/ cells retire; regression keeps its own). Patterns are
            # bash `case` globs where `*` also matches `/`, so a single
            # `…/scenarios/*` covers nested subagents/ and recordings/ files.
            case "$f" in
              replaydata/agents/scenarios.json)
                violations="$violations  - $f  (matrix catalog)"$'\n' ;;
              replaydata/orchestrators/*/scenarios/*)
                violations="$violations  - $f  (orchestrator scenario fixture)"$'\n' ;;
              replaydata/agents/*/regressions/*)
                # Everything under a regression recording is load-bearing,
                # INCLUDING assessment.json (regression cells aren't in the
                # catalog, so the viewer reads their assessment.json on disk).
                violations="$violations  - $f  (regression recording)"$'\n' ;;
              replaydata/agents/*/scenarios/*/assessment.json)
                : ;;  # allowed (the assessment lives in the cell's metadata.json)
              replaydata/agents/*/scenarios/*/metadata.json)
                # The cell descriptor itself: protected IFF the folder is still a
                # live cell at HEAD (i.e. the metadata.json survives at HEAD; a
                # deleted-and-gone folder is a retirement, allowed).
                agent=$(printf '%s' "$f" | sed -E 's#replaydata/agents/([^/]+)/scenarios/([^/]+)/.*#\1#')
                folder=$(printf '%s' "$f" | sed -E 's#replaydata/agents/([^/]+)/scenarios/([^/]+)/.*#\2#')
                if cell_is_live "$agent" "$folder"; then
                  violations="$violations  - $f  (metadata.json of live cell '$agent/$folder')"$'\n'
                fi ;;
              replaydata/agents/*/scenarios/*)
                # Any other artifact under a scenarios cell is protected IFF the
                # folder is still a live cell at HEAD (holds a metadata.json).
                # Orphan/retired folders are deletable.
                agent=$(printf '%s' "$f" | sed -E 's#replaydata/agents/([^/]+)/scenarios/([^/]+)/.*#\1#')
                folder=$(printf '%s' "$f" | sed -E 's#replaydata/agents/([^/]+)/scenarios/([^/]+)/.*#\2#')
                if cell_is_live "$agent" "$folder"; then
                  violations="$violations  - $f  (recording of live cell '$agent/$folder')"$'\n'
                fi ;;
              *) : ;;  # outside any recording folder → allowed
            esac
          done <<< "$deletions"

          if [ -n "$violations" ]; then
            echo "::error::PR deletes load-bearing replaydata (catalog or referenced recordings)."
            echo
            echo "Disallowed deletions:"
            printf '%s' "$violations"
            echo
            echo "The catalog and the recordings of live cells (folders holding a metadata.json)"
            echo "are load-bearing regression fixtures. To retire a cell, delete its whole folder"
            echo "(metadata.json included, so it stops being a live cell), or git mv the recording"
            echo "to regression/. For a genuine removal, open an issue and get maintainer sign-off."
            exit 1
          fi

          echo "OK: no disallowed deletions (orphan recordings, assessment.json, and renames are permitted)."
