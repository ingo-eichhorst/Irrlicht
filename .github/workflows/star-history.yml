name: Update Star History Chart

# Renders assets/star-history.svg from this repo's own stargazer data via
# tools/starhistory, so the README's chart doesn't depend on a live render
# from api.star-history.com (a free, shared third-party service whose
# GitHub API token pool periodically gets rate-limited) succeeding at
# page-load time.

on:
  push:
    branches: [main]
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

jobs:
  star-history:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: false

      - name: Generate star history chart
        # The default GITHUB_TOKEN is a GitHub App installation token, which
        # GitHub blocks from reading the starred_at-enriched stargazers
        # listing (403 "You do not have permission to view the stargazers
        # of this repository") no matter what `permissions:` this workflow
        # declares — there's no fine-grained permission that grants it. A
        # PAT with public-repo read access is required instead. See #1012.
        env:
          GITHUB_TOKEN: ${{ secrets.STARHISTORY_TOKEN }}
        run: |
          mkdir -p assets
          go run ./tools/starhistory -repo ingo-eichhorst/Irrlicht -out assets/star-history.svg

      - name: Commit chart update
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/star-history.svg
          if git diff --staged --quiet; then
            echo "No chart changes to commit"
            exit 0
          fi

          # main requires a PR for every change (0 approvals, no required
          # checks) — a direct push here always gets rejected with GH013.
          # Route the update through a same-repo branch + auto-merged PR
          # instead, so the update stays fully automated without weakening
          # branch protection. See #1012.
          branch="chore/star-history-update-${{ github.run_id }}"
          git checkout -b "$branch"
          git commit -m "chore: update star history chart [skip ci]"
          git push origin "$branch"
          gh pr create --base main --head "$branch" \
            --title "chore: update star history chart" \
            --body "Automated star history chart refresh."
          gh pr merge "$branch" --squash --delete-branch
