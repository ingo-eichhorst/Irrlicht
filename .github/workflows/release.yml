name: Release

# Builds a signed (or unsigned) .pkg installer and publishes a GitHub Release.
#
# Signing + notarization requires these repository secrets:
#   APPLE_DEVELOPER_ID_INSTALLER_CERT_B64  — base64-encoded Developer ID Installer .p12
#   APPLE_DEVELOPER_ID_INSTALLER_CERT_PASSWORD — .p12 password
#   APPLE_ID                               — Apple ID email for notarytool
#   APPLE_APP_SPECIFIC_PASSWORD            — app-specific password for notarytool
#   APPLE_TEAM_ID                          — 10-char Apple Developer Team ID
#
# If the signing secrets are absent the workflow still runs and produces an
# unsigned package (useful for CI validation on forks / unsigned builds).

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read version from version.json
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('version.json'))['version'])")
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Version: $VERSION"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: false

      # -----------------------------------------------------------------------
      # Code signing — skipped gracefully when secrets are absent
      # -----------------------------------------------------------------------
      - name: Import Developer ID Installer certificate
        id: cert-import
        env:
          CERT_B64: ${{ secrets.APPLE_DEVELOPER_ID_INSTALLER_CERT_B64 }}
          CERT_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_INSTALLER_CERT_PASSWORD }}
        run: |
          if [[ -z "$CERT_B64" ]]; then
            echo "⚠️  APPLE_DEVELOPER_ID_INSTALLER_CERT_B64 not set — package will be unsigned"
            echo "sign_identity=" >> $GITHUB_OUTPUT
            echo "SIGN_IDENTITY=" >> $GITHUB_ENV
            exit 0
          fi

          KEYCHAIN_PATH="$RUNNER_TEMP/irrlicht-signing.keychain-db"
          KEYCHAIN_PASSWORD=$(openssl rand -hex 20)

          # Create and unlock a temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import the .p12 certificate
          echo "$CERT_B64" | base64 --decode > "$RUNNER_TEMP/installer.p12"
          security import "$RUNNER_TEMP/installer.p12" \
            -P "$CERT_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          rm "$RUNNER_TEMP/installer.p12"

          # Allow codesign tools to access the key without a dialog
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

          # Add to the keychain search path
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          # Extract the signing identity name
          SIGN_IDENTITY=$(security find-identity -v "$KEYCHAIN_PATH" \
            | grep "Developer ID Installer" \
            | head -1 \
            | sed 's/.*) "\(.*\)"/\1/')

          if [[ -z "$SIGN_IDENTITY" ]]; then
            echo "❌  Could not extract Developer ID Installer identity from certificate"
            exit 1
          fi

          echo "✅  Signing identity: $SIGN_IDENTITY"
          echo "sign_identity=$SIGN_IDENTITY" >> $GITHUB_OUTPUT
          echo "SIGN_IDENTITY=$SIGN_IDENTITY" >> $GITHUB_ENV
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV

      # -----------------------------------------------------------------------
      # Build the .pkg installer
      # -----------------------------------------------------------------------
      - name: Build installer package
        run: |
          chmod +x ./platform/macos/create-installer-package.sh

          if [[ -n "${SIGN_IDENTITY:-}" ]]; then
            echo "Building signed package…"
            ./platform/macos/create-installer-package.sh \
              --version "$VERSION" \
              --sign "$SIGN_IDENTITY"
          else
            echo "Building unsigned package…"
            ./platform/macos/create-installer-package.sh \
              --version "$VERSION"
          fi

      # -----------------------------------------------------------------------
      # Notarize (only when signed AND Apple notarization secrets are present)
      # -----------------------------------------------------------------------
      - name: Notarize installer package
        if: ${{ steps.cert-import.outputs.sign_identity != '' }}
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [[ -z "$APPLE_ID" || -z "$APPLE_APP_SPECIFIC_PASSWORD" || -z "$APPLE_TEAM_ID" ]]; then
            echo "⚠️  Notarization secrets incomplete — skipping notarization"
            echo "    Set APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID to enable."
            exit 0
          fi

          PKG="build/Irrlicht-v${VERSION}.pkg"
          echo "🔏  Submitting $PKG to Apple notarization service…"
          xcrun notarytool submit "$PKG" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          echo "📌  Stapling notarization ticket…"
          xcrun stapler staple "$PKG"
          echo "✅  Notarization complete"

      # -----------------------------------------------------------------------
      # Cleanup keychain
      # -----------------------------------------------------------------------
      - name: Clean up temporary keychain
        if: always()
        run: |
          if [[ -n "${KEYCHAIN_PATH:-}" ]]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi

      # -----------------------------------------------------------------------
      # Compute checksums
      # -----------------------------------------------------------------------
      - name: Compute checksums
        run: |
          cd build
          shasum -a 256 "Irrlicht-v${VERSION}.pkg" > checksums-release.sha256
          echo "Checksums:"
          cat checksums-release.sha256

      # -----------------------------------------------------------------------
      # Create GitHub Release and upload artifacts
      # -----------------------------------------------------------------------
      - name: Create GitHub Release
        uses: actions/github-script@v7
        env:
          VERSION: ${{ env.VERSION }}
          SIGN_IDENTITY: ${{ env.SIGN_IDENTITY }}
        with:
          script: |
            const fs = require('fs');
            const version = process.env.VERSION;
            const signed = process.env.SIGN_IDENTITY
              ? '✅ Signed & notarized'
              : '⚠️ Unsigned (no Developer ID certificate configured)';

            const tagName = context.ref.startsWith('refs/tags/')
              ? context.ref.replace('refs/tags/', '')
              : `v${version}`;

            const release = await github.rest.releases.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tagName,
              name: `Irrlicht v${version}`,
              body: [
                `## Irrlicht v${version}`,
                '',
                `> **Package**: ${signed}`,
                '',
                '### Installation',
                '',
                `1. Download \`Irrlicht-v${version}.pkg\``,
                '2. Double-click to open the installer',
                '3. Follow the on-screen instructions',
                '',
                'This installs:',
                '- `/usr/local/bin/irrlicht-hook` — Claude Code hook receiver',
                '- `/usr/local/bin/irrlicht-settings-merger` — hook configuration tool',
                '- `/Applications/Irrlicht.app` — menu bar application',
                '',
                '### Uninstall',
                '',
                '```bash',
                '/usr/local/bin/irrlicht-uninstall.sh',
                '```',
              ].join('\n'),
              draft: false,
              prerelease: false,
            });

            // Upload .pkg
            const pkgData = fs.readFileSync(`build/Irrlicht-v${version}.pkg`);
            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.data.id,
              name: `Irrlicht-v${version}.pkg`,
              data: pkgData,
              headers: { 'content-type': 'application/octet-stream' },
            });

            // Upload checksums
            const checksumsData = fs.readFileSync('build/checksums-release.sha256', 'utf8');
            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.data.id,
              name: 'checksums.sha256',
              data: checksumsData,
              headers: { 'content-type': 'text/plain' },
            });

            console.log(`✅ Release published: ${release.data.html_url}`);
