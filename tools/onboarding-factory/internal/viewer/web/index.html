<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Irrlicht — Recording Viewer</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 13px; color: #222; background: #fafaf8; }
  #app { display: grid; grid-template-columns: 280px 1fr; grid-template-rows: 100vh; }
  #sidebar { background: #f0efe9; border-right: 1px solid #d8d6cc; overflow-y: auto; padding: 8px; }
  /* Collapsible groups: <details>/<summary> with a manual chevron so we
     don't fight the native marker on Safari/Firefox. The summary itself
     keeps the visual rhythm of the old <h1>/<h2> headers. */
  #sidebar details.subtree-group { margin: 16px 0 4px; }
  #sidebar details.subtree-group:first-of-type { margin-top: 4px; }
  #sidebar details.subtree-group > summary {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em;
    color: #444; padding: 4px 8px 6px;
    background: #e8e6da; border-radius: 3px; font-weight: 700;
    cursor: pointer; list-style: none; user-select: none;
    display: flex; align-items: center; gap: 6px;
  }
  #sidebar details.agent-group { margin: 4px 0 4px 0; }
  #sidebar details.agent-group > summary {
    font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em;
    color: #666; margin: 8px 4px 4px 12px; padding: 2px 4px;
    cursor: pointer; list-style: none; user-select: none;
    display: flex; align-items: center; gap: 6px;
    border-radius: 3px;
  }
  #sidebar details.agent-group > summary:hover { background: #e0dfd5; }
  #sidebar details summary::-webkit-details-marker { display: none; }
  #sidebar .chev {
    display: inline-block; width: 9px; transition: transform 0.12s ease;
    color: #888; font-size: 10px; line-height: 1;
  }
  #sidebar details[open] > summary > .chev { transform: rotate(90deg); }
  #sidebar .group-count { margin-left: auto; color: #999; font-weight: 400; font-size: 10px; }
  .scn {
    cursor: pointer; padding: 4px 8px; border-radius: 3px;
    display: block; width: 100%; text-align: left;
    background: transparent; border: 0; color: inherit;
    font: inherit; font-size: 13px;
  }
  #sidebar details.agent-group > .scn { margin-left: 16px; width: calc(100% - 16px); }
  .scn:hover { background: #e0dfd5; }
  .scn.active { background: #d8d6cc; font-weight: 600; }
  .scn .agent { color: #888; font-size: 11px; }
  .scn.overview-btn { font-weight: 600; margin-bottom: 8px; background: #e8e6da; }
  .scn.overview-btn:hover { background: #ddd9c8; }
  table.overview-matrix th { font-size: 11px; }
  table.overview-matrix td { vertical-align: middle; }
  #main { padding: 16px 20px; overflow-y: auto; }
  #title { font-size: 18px; font-weight: 600; margin: 0 0 4px; }
  #breadcrumb { color: #888; margin-bottom: 16px; font-size: 12px; }
  .panel { background: white; border: 1px solid #d8d6cc; border-radius: 4px; padding: 12px 16px; margin-bottom: 16px; }
  .panel h3 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; color: #666; margin: 0 0 8px; }
  .controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .controls button { padding: 4px 10px; border: 1px solid #c0bdb1; background: #fff; border-radius: 3px; cursor: pointer; }
  .controls button:hover { background: #f0efe9; }
  .speed { background: #eaeae0; padding: 2px 8px; border-radius: 3px; font-family: monospace; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th, td { text-align: left; padding: 4px 8px; border-bottom: 1px solid #ece9dd; }
  th { background: #f5f4ee; font-weight: 600; }
  tr.hl { background: #fff7d6; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
  .badge.working { background: #fde7c1; color: #8a4500; }
  .badge.waiting { background: #f8c8c8; color: #8a0000; }
  .badge.ready   { background: #d6f0d4; color: #1f5a1d; }
  .badge.ended   { background: #eaeae0; color: #555; font-style: italic; }
  .badge.pass { background: #d6f0d4; color: #1f5a1d; }
  .badge.fail { background: #f8c8c8; color: #8a0000; }
  pre.snapshot { background: #1e1e1e; color: #d4d4d4; padding: 8px; border-radius: 4px; font-size: 11px; overflow-x: auto; max-height: 240px; }
  #scrubber-wrap { position: relative; height: 24px; margin: 4px 0; }
  #scrubber { width: 100%; }
  #playhead-info { font-family: monospace; font-size: 11px; color: #555; }

  /* Timeline scrubber: overlaid on the state band. The visual track is
     the band underneath; we only want the thumb (the playhead) to show.
     Per-browser rules are needed because <input type="range"> styling
     is split across pseudo-elements. */
  .timeline-scrubber {
    position: absolute; inset: 0; width: 100%; height: 100%;
    -webkit-appearance: none; appearance: none;
    background: transparent; margin: 0; padding: 0; cursor: pointer;
    z-index: 2;
  }
  .timeline-scrubber:disabled { cursor: default; }
  .timeline-scrubber::-webkit-slider-runnable-track { background: transparent; height: 100%; }
  .timeline-scrubber::-moz-range-track { background: transparent; height: 100%; }
  .timeline-scrubber::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 4px; height: 22px;
    background: #222; border: 1px solid #fff; border-radius: 2px;
    box-shadow: 0 0 0 1px rgba(0,0,0,0.2);
    margin-top: -2px;
  }
  .timeline-scrubber::-moz-range-thumb {
    width: 4px; height: 22px;
    background: #222; border: 1px solid #fff; border-radius: 2px;
    box-shadow: 0 0 0 1px rgba(0,0,0,0.2);
  }
  /* Rendered Markdown (assessment body etc.) — see renderMarkdown() in viewer.js. */
  .md-body { font-size: 13px; line-height: 1.55; color: #222; margin: 0 0 10px 0;
    padding: 10px 12px; background: #fafaf6; border: 1px solid #ece9dd; border-radius: 4px; }
  .md-body > :first-child { margin-top: 0; }
  .md-body > :last-child { margin-bottom: 0; }
  .md-body h4 { font-size: 13px; margin: 14px 0 6px; color: #1f2a44;
    border-bottom: 1px solid #ece9dd; padding-bottom: 3px; }
  .md-body h5 { font-size: 12px; margin: 12px 0 4px; color: #333; }
  .md-body h6 { font-size: 11px; margin: 10px 0 4px; color: #555; text-transform: uppercase; letter-spacing: 0.03em; }
  .md-body p { margin: 0 0 8px; }
  .md-body ul, .md-body ol { margin: 0 0 8px; padding-left: 22px; }
  .md-body li { margin: 2px 0; }
  .md-body code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px;
    background: #eceadf; color: #5a3d00; padding: 0.5px 4px; border-radius: 3px; }
  .md-body strong { color: #111; }
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <h2>Recordings</h2>
    <div id="scenarios">Loading…</div>
  </div>
  <div id="main">
    <div id="title">Select a recording</div>
    <div id="breadcrumb">—</div>
    <div id="detail"></div>
  </div>
</div>
<script type="module" src="viewer.js"></script>
</body>
</html>
