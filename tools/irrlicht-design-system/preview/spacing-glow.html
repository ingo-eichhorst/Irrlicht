<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><link href="https://fonts.googleapis.com/css2?family=DM+Mono&display=swap" rel="stylesheet"><style>
.row{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.glow{aspect-ratio:1.4;border-radius:12px;display:flex;align-items:center;justify-content:center;background:#0a1020}
.orb{width:28px;height:28px;border-radius:50%}
.lbl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.15em;text-transform:uppercase;color:#c8cdd8;margin-top:6px;text-align:center}
.head{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:#5a6378}
</style></head><body><div class="card">
<div class="head">Glow system — color halos on lights &amp; CTAs</div>
<div class="row">
<div><div class="glow"><div class="orb" style="background:#8B5CF6;box-shadow:0 0 20px #8B5CF6,0 0 60px rgba(139,92,246,0.4)"></div></div><div class="lbl">glow-purple</div></div>
<div><div class="glow"><div class="orb" style="background:#FF9500;box-shadow:0 0 20px #FF9500,0 0 60px rgba(255,149,0,0.35)"></div></div><div class="lbl">glow-orange</div></div>
<div><div class="glow"><div class="orb" style="background:#34C759;box-shadow:0 0 20px #34C759,0 0 60px rgba(52,199,89,0.35)"></div></div><div class="lbl">glow-green</div></div>
</div>
</div></body></html>
