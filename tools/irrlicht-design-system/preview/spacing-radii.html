<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><link href="https://fonts.googleapis.com/css2?family=DM+Mono&display=swap" rel="stylesheet"><style>
.row{display:grid;grid-template-columns:repeat(6,1fr);gap:12px}
.r{aspect-ratio:1;background:rgba(12,18,35,0.8);border:1px solid rgba(138,92,246,0.15);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:8px}
.n{font-family:'DM Mono',monospace;font-size:10px;color:#e8ecf4;letter-spacing:0.08em}
.v{font-family:'DM Mono',monospace;font-size:9px;color:#5a6378}
.head{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:#5a6378}
</style></head><body><div class="card">
<div class="head">Corner radii</div>
<div class="row">
<div class="r" style="border-radius:3px"><div class="n">xs</div><div class="v">3px</div></div>
<div class="r" style="border-radius:4px"><div class="n">sm</div><div class="v">4px</div></div>
<div class="r" style="border-radius:6px"><div class="n">md</div><div class="v">6px</div></div>
<div class="r" style="border-radius:10px"><div class="n">lg</div><div class="v">10px</div></div>
<div class="r" style="border-radius:16px"><div class="n">xl</div><div class="v">16px</div></div>
<div class="r" style="border-radius:24px"><div class="n">2xl</div><div class="v">24px</div></div>
</div>
</div></body></html>
