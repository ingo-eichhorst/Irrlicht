<!DOCTYPE html><html><head><meta charset="utf-8"><link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet"><link rel="stylesheet" href="_base.css"><style>
.row{display:flex;gap:16px;align-items:center;flex-wrap:wrap}
.swatch{flex:1;min-width:140px;border-radius:10px;padding:18px 16px;border:1px solid rgba(255,255,255,0.04);position:relative;overflow:hidden;height:110px;display:flex;flex-direction:column;justify-content:space-between}
.swatch::before{content:'';position:absolute;inset:0;border-radius:10px;pointer-events:none}
.dot{width:14px;height:14px;border-radius:50%}
.name{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:#e8ecf4;opacity:0.85}
.hex{font-family:'DM Mono',monospace;font-size:11px;color:#c8cdd8;opacity:0.7}
.desc{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:#5a6378}
</style></head><body><div class="card"><div class="row">
<div class="swatch" style="background:rgba(139,92,246,0.10);box-shadow:inset 0 0 0 1px rgba(139,92,246,0.25)"><div><div class="dot" style="background:#8B5CF6;box-shadow:0 0 10px #8B5CF6,0 0 25px rgba(139,92,246,0.4)"></div></div><div><div class="name">working</div><div class="hex">#8B5CF6</div></div></div>
<div class="swatch" style="background:rgba(255,149,0,0.10);box-shadow:inset 0 0 0 1px rgba(255,149,0,0.25)"><div><div class="dot" style="background:#FF9500;box-shadow:0 0 10px #FF9500,0 0 25px rgba(255,149,0,0.4)"></div></div><div><div class="name">waiting</div><div class="hex">#FF9500</div></div></div>
<div class="swatch" style="background:rgba(52,199,89,0.10);box-shadow:inset 0 0 0 1px rgba(52,199,89,0.25)"><div><div class="dot" style="background:#34C759;box-shadow:0 0 10px #34C759,0 0 25px rgba(52,199,89,0.4)"></div></div><div><div class="name">ready</div><div class="hex">#34C759</div></div></div>
</div><div class="desc">The Light System &mdash; three semantic states, never decorative</div></div></body></html>
