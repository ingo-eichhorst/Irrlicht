<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;700&family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet"><style>
.q{font-family:'Cormorant Garamond',serif;font-weight:300;color:#e8ecf4;font-size:30px;line-height:1.2;letter-spacing:0.01em;text-wrap:pretty}
.q em{font-style:italic;color:#8B5CF6}
.meta{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:#5a6378;margin-top:6px}
.rule{height:1px;background:linear-gradient(90deg,transparent,#1a2340,transparent);margin:10px 0}
.tag{font-family:'DM Mono',monospace;font-size:10px;color:#c8cdd8;letter-spacing:0.05em}
.tag span{color:#8B5CF6}
</style></head><body><div class="card" style="gap:8px">
<div class="meta">Tone — poetic, technical, specific</div>
<div class="q">A will-o'-the-wisp that leads travellers from the <em>safe path</em>.</div>
<div class="rule"></div>
<div class="tag">Lowercase prose. Metric precision. Em-dashes over colons. <span>Never exclamation points.</span></div>
</div></body></html>
